---
$schema: https://json-schema.org/draft/2020-12/schema
description: |-
  This JSON Schema defines the structure of JSON-LD frames used in the API and CSV generation in the https://schema.gov.it ecosystem.
  Thus, it is not a generic JSON Schema validator for all JSON-LD frames, but rather a specific schema that enforces the necessary constraints for the frames used in this project.

  :warning: The CLI applies further validation rules on top
  of this schema, such as:

  - Specific field mappings for `label`, `parent`, and `vocab` fields;
  - Only one `@type` is allowed;
  - Field names must be valid variable names (e.g., no spaces, special characters, etc.);
$defs:
  HierarchicalArray:
    description: |-
      A hierarchical field must be structured as an array in the JSON-LD output to correctly represent multiple values and maintain compatibility with JSON-LD framing.

      The "@container": "@set" directive is used to indicate that the field should be treated as a set of values, allowing for multiple entries without enforcing a specific order. This is essential for fields like "parent" that may have multiple broader concepts in a hierarchical structure.

      Additionally, the "@type" of the field must not conflict with the JSON array structure, ensuring that the data can be correctly framed and processed without errors.
    type: object
    required:
    - "@container"
    properties:
      "@container":
        enum:
        - "@set"
        - "@list"
      "@type":
        description: |-
          A hierarchical field must not have an "@type" that conflicts with the JSON array structure.
        not:
          enum:
          - "@vocab"
          - "@id"
      "@context":
        properties:
          uri:
            const: "@id"
    examples:
    - "@id": "skos:broader"
      "@container": "@set"
      "@context":
        uri: "@id"

  JSONLDContext:
    description: |-
      The standardized "@context" must be a dictionary,
      since string contexts are not supported to avoid dereferencing
      remote resources.

      Field mappings are constrained to ensure that all vocabularies
      have a consistent structure once projected to a CSV or an API response
      distribution.
    type: object
    required:
    - uri
    - label
    properties:
      uri:
        description: |-
          The "uri" field must be mapped to "@id" to ensure that the unique identifier of each item is correctly represented in the JSON-LD output.
        const: "@id"
      label:
        description: |-
          The "label" field is required and it must be mapped
          properly to a JSON string field.

          If the rdf Property (e.g., skos:prefLabel) has language-tagged string values,
          the frame must use "@language" to indicate the language of the label values.

          Supported mappings:

          - skos:prefLabel
          - rdfs:label
        examples:
        - skos:prefLabel
        - "@id": skos:prefLabel
          "@language": "it"
      level:
        description: |-
          The "level" field, if present, must be mapped to a JSON string field that indicates the hierarchical level of the item within the vocabulary.
          This field is used to represent the depth of the item in a hierarchy, allowing for proper structuring and organization of concepts in the JSON-LD output.

          Supported mappings:

          - https://w3id.org/italia/onto/CLV/hasRankOrder
          - http://rdf-vocabulary.ddialliance.org/xkos#depth
        examples:
        - xkos:depth
        - https://w3id.org/italia/onto/CLV/hasRankOrder
        - "@id": xkos:depth
          "@type": "http://www.w3.org/2001/XMLSchema#integer"
      id:
        description: |-
          The "id" field, if present, must be mapped to
          a property that is an unique identifier for each item
          within the vocabulary.
          It's framed value must be a JSON string that serves as the unique identifier for each item in the vocabulary:
          this could be achieved via type coercion.

          This field is crucial for ensuring that each concept can be uniquely identified in CSV and APIs.

          Supported mappings:

          - skos:notation
          - dcterms:identifier
          - "http://purl.org/dc/elements/1.1/identifier"

        examples:
        - skos:notation
        - "@id": skos:notation
          "@type": "http://www.w3.org/2001/XMLSchema#string"
      parent:
        description: |-
          The "parent" field tracks hierarchical relationships
          between items,
          ensuring they are correctly represented as
          an array of broader concepts in the JSON-LD output.

          Further implementations may allow for additional
          mappings beyond skos:broader.

          Supported mappings:

          - skos:broader
        $ref: "#/$defs/HierarchicalArray"
      vocab:
        description: |-
          This field is used to represent the vocabulary or scheme to which the item belongs, and it must be structured as an array of URIs in the JSON-LD output.

          Supported mappings:

          - skos:inScheme
        $ref: "#/$defs/HierarchicalArray"
      href:
        description: |-
          "href" is a reserved keyword automatically added by the API to each item
          to reference the current resource URL.
          If present in the context, it must be mapped to null to avoid conflicts.
        const: null

type: object
required:
- "@context"
properties:
  "@context":
    $ref: "#/$defs/JSONLDContext"
