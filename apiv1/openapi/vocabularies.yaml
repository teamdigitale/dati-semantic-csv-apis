          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: '#/components/schemas/ServiceMeta'
        predecessor-version:
          description: |-
            Link to the previous version of this vocabulary API,
            if any.
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: '#/components/schemas/Link'
      example:
        href: https://schema.gov.it/api/vocabularies/v1/istat/ateco-2007
