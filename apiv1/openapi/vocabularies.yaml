        version: versione 2007 - aggiornamento 2021
        author: https://w3id.org/italia/data/public-organization/ISTAT
        description: Classificazione ISTAT Ateco 2007 - Aggiornamento 2021; la classificazione è usata per catalogare le attività economiche. E' la classificazione di riferimento per il Registro Imprese
        hreflang:
