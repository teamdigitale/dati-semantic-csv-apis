---
openapi: 3.0.4
info:
  title: Controlled Vocabularies API - Common Schemas
  description: |-
    This document defines common schemas used across the Controlled Vocabularies APIs.
  version: 1.0.0
paths: {}
# spectral:disable-next-line oas3-api-servers
servers: []
# checkov:skip=CKV_OPENAPI_4
# checkov:skip=CKV_OPENAPI_5
components:
  parameters:
    #
    # Pagination.
    #
    limit:
      name: limit
      in: query
      explode: false
      description: Maximum number of items to return. If unset,
        used default value 10.
      schema:
        $ref: '#/components/schemas/Limit'
      example: 10
    offset:
      name: offset
      in: query
      explode: false
      description: Offset for pagination
      schema:
        $ref: '#/components/schemas/Offset'
      example: 0
      # Common schemas.
    agencyIdPath:
      name: agencyId
      in: path
      description: |-
        Agency identifier matched via the latest path segment of the agency URI.
        For example, for the agency URI `https://w3id.org/italia/data/public-organization/ISTAT`, `istat` is a valid agencyIdPath.
      required: true
      schema:
        $ref: '#/components/schemas/AsciiText'
      example: istat
    keyConceptPath:
      name: keyConcept
      in: path
      description: |-
        Key concept identifier matched via the latest path segment of the key concept URI.
        For example, for the key concept URI `https://w3id.org/italia/data/public-organization/ISTAT/ente`, `ente` is a valid keyConceptPath.
      required: true
      schema:
        $ref: '#/components/schemas/AsciiText'
      example: ateco-2025
  schemas:
    AsciiText:
      description: |-
        An ASCII text string that constrains
        the length and characters of the input.

        This is a substring match on the corresponding field of
        the vocabulary metadata.
      type: string
      maxLength: 32
      pattern: '^[a-zA-Z0-9-_]{1,32}$'
    TextFilter:
      description: |-
        A text filter that constrains
        the length and characters of the input.

        This is a substring match on the corresponding field of
        the vocabulary metadata.
      type: string
      maxLength: 128
      pattern: '^[A-Za-z0-9 ._:/-]{1,128}$'
    Link:
      description: |-
        A link to a resource.
      type: object
      required:
      - href
      properties:
        href:
          $ref: '#/components/schemas/URI'
    URI: &URI
      description: |-
        An absolute URI.
      type: string
      format: uri
      maxLength: 2048
      pattern: >-
        ^(about:|https?://|urn:).*
      example: https://schema.gov.it/vocabularies/v1/agid/agentecausale/
    Url:
      description: |-
        An URL that is either absolute or relative.
      type: string
      format: uri-reference
      example: /vocabularies/v1/agid/agentecausale/openapi.yaml
    Limit:
      description: |-
        A limit for pagination.
        This value is bounded by the maximum number of items that can be returned by the API.
      type: integer
      format: int32
      minimum: 0
      maximum: 200
      default: 20
      example: 50
    Offset:
      description: |-
        An offset for pagination.

        This API supports at maximum ~100_000 items vocabularies.
      type: integer
      format: int32
      minimum: 0
      maximum: 100000
      default: 0
      example: 0
    Problem:
      description: |-
        Convey information conditions
        in HTTP API responses according to
        RFC 9457 Problem Details.

        Do not disclose sensitive information
        or internal implementation details.

        You need to provide the minimum
        information required to help the client
        to issue a successful request.

        Note: According to RFC9457, `type` is the only required field;
        since it defaults to `about:blank`, in this JSON Schema
        it is not required.
      additionalProperties: false
      type: object
      required:
      - title
      - status
      properties:
        type:
          <<: *URI
          default: about:blank
        title:
          type: string
          maxLength: 128
        status:
          type: integer
          minimum: 100
          maximum: 599
          format: int32
        detail:
          type: string
          maxLength: 1024
        instance:
          $ref: '#/components/schemas/Url'
  headers:
    Retry-After:
      description: |-
        Retry contacting the endpoint *at least* after seconds.
        See https://tools.ietf.org/html/rfc7231#section-7.1.3
      schema:
        format: int32
        maximum: 186400
        minimum: 0
        type: integer
    X-RateLimit-Limit:
      description: The number of allowed requests in the current
        period
      schema:
        format: int32
        maximum: 1000000
        minimum: 0
        type: integer
    X-RateLimit-Remaining:
      description: The number of remaining requests in the current
        period
      schema:
        format: int32
        maximum: 1000000
        minimum: 0
        type: integer
    X-RateLimit-Reset:
      description: The number of seconds left in the current period
      schema:
        format: int32
        maximum: 186400
        minimum: 0
        type: integer
  responses:
    TooManyRequests:
      description: Too many requests.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ServiceUnavailable:
      description: Service unavailable.
      headers:
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    GenericError:
      description: |-
        The request was not successful.
      headers:
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
