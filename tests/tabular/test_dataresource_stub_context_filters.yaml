  frame: &agente_causale_skos_frame
    #
    # This frame project a vocabulary compliant with the SKOS model
    #   to a JSON structure. It relies only on skos and xkos vocabularies
    #   and not on the rdfs model.
    #
    # Only show fields and identifiers listed in @context.
    "@explicit": true

    # Always embed external references.
    "@embed": "@never"
    "@omitDefault": true

    # Use context.
    "@context": &agente_causale_skos_context
      "@base": "https://w3id.org/italia/work-accident/controlled-vocabulary/adm_serv/agente_causale/"
      "@vocab": "https://w3id.org/italia/work-accident/controlled-vocabulary/adm_serv/"

      dct: http://purl.org/dc/terms/
      skos: http://www.w3.org/2004/02/skos/core#
      xkos: http://rdf-vocabulary.ddialliance.org/xkos#
      clvapit: https://w3id.org/italia/onto/CLV/
      xsd: "http://www.w3.org/2001/XMLSchema#"

      # Fields.
      uri: "@id"
      id:
        "@id": "http://www.w3.org/2004/02/skos/core#notation"

      #Localize labels. Order is relevant.
      label:
        "@id": http://www.w3.org/2004/02/skos/core#prefLabel
        "@language": it
      # When mapping to a list, use @container: @set
      #   to ensure that JSON-LD framing handles it as an array.
      parent:
        # A list of broader links.
        "@id": "http://www.w3.org/2004/02/skos/core#broader"
        "@container": "@set"
        "@context":
          uri: "@id"

      vocab:
        "@id": "http://www.w3.org/2004/02/skos/core#inScheme"
        "@container": "@set"
        "@context":
          uri: "@id"

      level:
        # Use type coercion to ensure that level is a JSON Number.
        "@id": "http://rdf-vocabulary.ddialliance.org/xkos#depth"
        "@type": http://www.w3.org/2001/XMLSchema#integer

    "@requireAll": true
    #
    # Filter entries.
    #
    "@type":
    - "https://w3id.org/italia/work-accident/onto/adm_serv/AgenteCausaleINAIL"
    uri: {}
    id: {}
    label:
      "@language": ["it"]
      "@value": {}
    level: {}

    # Only pick entries in the specified vocabulary.
    vocab:
    - uri: "https://w3id.org/italia/work-accident/controlled-vocabulary/adm_serv/agente_causale"
      "@explicit": true
      # If the referenced vocabulary has further properties,
      #   (e.g., @type), do not embed them.
      "@embed": "@never"
    # If no parent, return an empty list (e.g., when level=1).
    parent:
    - uri: {}
      "@default": "@null"
      "@explicit": true
      "@requireAll": false
      "@embed": "@never"
