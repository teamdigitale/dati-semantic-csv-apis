      # Fields.
      uri: "@id"
      id:
        "@id": "skos:notation"

      #Localize labels. Order is relevant.
      label:
        "@id": skos:prefLabel
        "@language": it
      # When mapping to a list, use @container: @set
      #   to ensure that JSON-LD framing handles it as an array.
      parent:
        # A list of broader links.
        "@id": "skos:broader"
        "@container": "@set"
        "@context":
          uri: "@id"
          id:
            "@id": "skos:notation"

      vocab:
        "@id": skos:inScheme
        "@container": "@set"
        "@context":
          uri: "@id"

      level:
        # Use type coercion to ensure that level is a JSON Number.
        "@id": xkos:depth
        "@type": xsd:integer

    # Only show fields and identifiers listed in @context.
    "@explicit": true

    # Always embed external references.
    "@embed": "@never"
    "@omitDefault": true

    "@requireAll": true
    #
    # Filter entries.
    #
    "@type":
    - "https://w3id.org/italia/work-accident/onto/adm_serv/AgenteCausaleINAIL"
    uri: {}
    id: {}
    label:
      "@language": ["it"]
      "@value": {}
    level: {}

    # Only pick entries in the specified vocabulary.
    vocab:
    - uri: "https://w3id.org/italia/work-accident/controlled-vocabulary/adm_serv/agente_causale"
      "@explicit": true
      # If the referenced vocabulary has further properties,
      #   (e.g., @type), do not embed them.
      "@embed": "@never"
