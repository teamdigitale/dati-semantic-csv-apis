      skos:definition "This section includes the exploitation of vegetal and animal natural resources, comprising the activities of growing of crops, raising and breeding of animals, harvesting of timber and other plants, and the production of animal products from a farm or natural habitats. This section also includes organic agriculture, aquaculture, the growing of genetically modified crops and the raising of genetically modified animals."@en, "In questa sezione sono incluse le attività produttive che utilizzano le risorse di origine vegetale e animale. La sezione include attività di coltivazione (agricoltura), di allevamento di animali (zootecnia), di raccolta di legname e altre piante (silvicoltura), di produzione di prodotti animali in aree di allevamento o nei loro habitat naturali. Questa sezione include anche l'agricoltura biologica, l'acquacoltura, la coltivazione di colture geneticamente modificate e l'allevamento di animali geneticamente modificati."@it;
