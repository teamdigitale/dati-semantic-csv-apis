    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix xsd: <http://www.w3.org/2001/XMLSchema#> .

    :SPN a skos:Concept ;
      skos:prefLabel "Sanapaná"@en ;
      at:authority-code "SPN" ;
      at:deprecated "false" ;
      at:op-code "SPN" ;
      at:op-mapped-code [ a at:MappedCode ;
              at:legacy-code "spn" ;
              dc:source "iso-639-3" ] ;
      at:start.use "1950-05-09" ;
      atold:op-code "SPN" ;
      dc:identifier "SPN" ;
      skos:inScheme :0003,
          atold:language ;
      skos:notation "spn"^^euvoc:ISO_639_3,
          "spn"^^euvoc:XML_LNG ;
      skos:topConceptOf :0003,
          atold:language .

      :ENG a skos:Concept ;
          skos:prefLabel "angielski"@pl,
              "anglais"@fr,
              "angleščina"@sl,
              "angličtina"@cs,
              "angličtina"@sk,
              "anglų kalba"@lt,
              "angol"@hu,
              "Englisch"@de,
              "English"@en,
              "inglese"@it,
              "inglés"@es,
              "inglês"@pt,
              "jendźelšćina"@hsb,
              "αγγλικά"@el ;
          skos:definition "English is a member of the West Germanic group of the Germanic languages. It is an official language of almost 60 sovereign states and is now a global lingua franca.It is the third-most-common native language in the world and it is widely learned as a second language."@en,
              "L’anglais est une langue appartenant au groupe occidental des langues germaniques. C’est la langue officielle de près de 60 États souverains. De nos jours, l’anglais est une lingua franca mondiale (langue véhiculaire).L’anglais est la troisième langue maternelle la plus parlée dans le monde et la langue la plus étudiée comme deuxième langue."@fr ;
          at:authority-code "ENG" ;
          at:deprecated "false" ;
          at:op-code "ENG" ;
          at:op-mapped-code [ a at:MappedCode ;
                  at:affected-table "FD_060" ;
                  at:legacy-code "EN" ;
                  dc:source "EurLex" ],
              [ a at:MappedCode ;
                  at:legacy-code "en" ;
                  dc:source "iso-639-1" ],
              [ a at:MappedCode ;
                  at:legacy-code "eng" ;
                  dc:source "iso-639-3" ] ;
          atold:op-code "ENG" ;
          dc:identifier "ENG" ;
          skos:exactMatch <http://id.loc.gov/vocabulary/iso639-1/en> ;
          skos:inScheme :0001,
              :0002,
              atold:language ;
          skos:notation "EN"^^euvoc:EUDOR_LNG,
              "en"^^euvoc:ISO_639_1,
              "eng"^^euvoc:ISO_639_3 ;
          skos:topConceptOf :0001,
              :0002,
              atold:language .
  frame:
    # Only show fields and identifiers listed in @context.
    "@explicit": true

    # Always embed external references.
    "@embed": "@never"
    "@omitDefault": true

    # The context is used to compact the resulting frame.
    "@context": &language_eu_skos_context
      # "@base": "http://publications.europa.eu/resource/authority/language/"
      "@vocab": "http://publications.europa.eu/ontology/authority/"
      at: http://publications.europa.eu/ontology/authority/
      dct: http://purl.org/dc/terms/
      skos: http://www.w3.org/2004/02/skos/core#
      xkos: http://rdf-vocabulary.ddialliance.org/xkos#
      xsd: "http://www.w3.org/2001/XMLSchema#"
      euvoc: "http://publications.europa.eu/ontology/euvoc#"
      uri: "@id"
      id:
        # Use type coercion to select a specific identifier.
        "@id": "skos:notation"
        "@type": euvoc:ISO_639_3
      label_it:
        "@id": skos:prefLabel
        "@language": it
      label_de:
        "@id": skos:prefLabel
        "@language": de
      label_sl:
        "@id": skos:prefLabel
        "@language": sl
      label:
        "@id": skos:prefLabel
        "@language": en
      vocab:
        "@id": skos:inScheme
        "@container": "@set"
      deprecated:
        "@id": at:deprecated
    #
    # Filter entries.
    #
    "@requireAll": true
    "@type": skos:Concept
    uri: {}
    deprecated: "false"
    # The vocabularies containing the Concept.
    vocab:
    - uri: {}
      "@embed": "@never"
    # :warning: FIXME: in this vocabulary,
    #   the euvoc:ISO_639_1 is not always present, so we cannot require it.
    #   it is not clear whether we can "filter out"
    #   entries without id, since at least one `id` is present.
    #   For now, we just use the euvoc:ISO_639_3.
    id:
      "@type": euvoc:ISO_639_3
    label:
      "@language": ["sl", "en", "de", "it"]
      "@value": {}
    label_it: {}
    label_de: {}
    label_sl: {}
    # While it is possible to add default values,
    #   we do not need them.
    # level:
    #   "@default": 1
  expected_payload: language-eu-skos.data.yaml
  expected_jsonschema:
    type: object
    properties:
      id:
        type: string
        minLength: 1
        pattern: '^[A-Za-z0-9._-]+$'
      uri: *URL
      label: *Label
      label_it: *Label
      label_de: *Label
      label_sl: *Label
      vocab:
        type: array

        items:
          type: object
          required:
          - uri
          properties:
            uri: *URL
      deprecated:
        type: string
    required:
    - deprecated
    - label
    - uri
    # - label_de
    # - label_it
    # - label_sl
    - vocab
- name: language-eu-skos-strip
  description: |-
    Given:
    - a skos vocabulary with with multiple identifiers
      with different datatypes (e.g., xsd:string, xsd:token)
    - a frame that selects a specific identifier with type coercion (e.g., euvoc:ISO_639_1)

    When:
    - the projection process encounters entries where the selected identifier is missing
      but other identifiers are present

    Then:
    - the projection process should remove entries that
      are not mentioned in the `@context` (e.g., entries without the selected identifier).
  data: *language_eu_ttl
  frame:
    "@context":
      <<: *language_eu_skos_context
      # Only pick entries with the specified identifier.
      id:
        "@id": "skos:notation"
        "@type": euvoc:ISO_639_3
    "@explicit": true
    "@embed": "@never"
    "@omitDefault": true
    "@requireAll": true
    "@type": skos:Concept
    uri: {}
    id: {}
    label:
      "@language": ["sl", "en", "de", "it"]
      "@value": {}
    label_it: {}
    label_de: {}
    label_sl: {}
  expected_payload: language-eu-skos-strip.data.yaml
