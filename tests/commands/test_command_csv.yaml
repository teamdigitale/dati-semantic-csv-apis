- id: csv_create_agente_causale_no_output
  description: |-
    Given:
    - a JSON-LD file and datapackage

    When:
    - I run `csv create` without --output

    Then:
    - output path is inferred from datapackage (covers log line 78)
  steps:
  - command:
    - csv
    - create
    - --jsonld
    - tests/data/snapshots/agente_causale/agente_causale.data.yamlld
    - --datapackage
    - tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
    - --force
    expected:
      exit_status: 0
      logs:
      - >-
        Using output path from datapackage

- id: csv_create_agente_causale_different_output
  description: |-
    Given:
    - a JSON-LD file and datapackage

    When:
    - I run `csv create` with --output pointing to a different path than the datapackage

    Then:
    - a warning is printed (covers branch 81->87)
  steps:
  - command:
    - csv
    - create
    - --jsonld
    - tests/data/snapshots/agente_causale/agente_causale.data.yamlld
    - --datapackage
    - tests/data/snapshots/agente_causale/agente_causale-datapackage.yaml
    - --output
    - tests/data/snapshots/agente_causale/agente_causale-alt-output.deleteme.csv
    - --force
    expected:
      exit_status: 0
      stdout:
      - >-
        ⚠ Warning: Output path.*differs from datapackage path

- id: csv_create_no_dialect
  description: |-
    Given:
    - a JSON-LD file and a datapackage with no dialect section

