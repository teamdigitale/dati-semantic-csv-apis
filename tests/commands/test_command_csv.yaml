    Then:
    - the command succeeds without setting dialect (covers branch 186->190)
  steps:
  - command:
    - csv
    - create
    - --jsonld
    - tests/data/snapshots/provinces/provinces.data.yamlld
    - --datapackage
    - tests/data/no-dialect-datapackage.yaml
    - --output
    - tests/data/snapshots/provinces/provinces-no-dialect.deleteme.csv
    - --force
    expected:
      exit_status: 0
      logs:
      - >-
        CSV file created successfully

- id: csv_validate_error
  description: |-
    Given:
    - a datapackage referencing a nonexistent CSV

    When:
    - I run `csv validate`

    Then:
    - the command exits with error code 1
    - an error message is shown (covers exception handler 137-141)
  steps:
  - command:
    - csv
    - validate
    - --vocabulary-uri
    - https://any-uri.example.com
    - --ttl
    - assets/controlled-vocabularies/provinces/provinces.ttl
    - --datapackage
    - tests/data/invalid-datapackage.yaml
    expected:
      exit_status: 1
      stdout:
      - >-
        ✗ CSV roundtrip validation failed

