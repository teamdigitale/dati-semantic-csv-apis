---
testcases:
- id: invalid string context
  description: |-
    When:

    - A JSON-LD frame with a string @context is used.

    Then:

    - A ValueError is raised indicating that string @context is not supported.
  frame:
    "@context": "http://example.com/context"

- id: invalid string context with type
  description: |-
    When:

    - A JSON-LD frame with a string @context and a valid @type is used.

    Then:

    - A ValueError is raised indicating that string @context is not supported.
  frame:
    "@context": "http://example.com/context"
    "@type": ExampleType

- id: missing type
  description: |-
    When:

    - A JSON-LD frame without an @type is used.

    Then:

    - A ValueError is raised indicating that @type is required.
  frame:
    "@context":
      skos: "http://www.w3.org/2004/02/skos/core#"
      uri: "@id"
      id:
        "@id": "skos:notation"

- id: multiple types
  description: |-
    When:

    - A JSON-LD frame with multiple @type values is used.

    Then:

    - A ValueError is raised indicating that multiple @type values are not supported.
  frame:
    "@context":
      uri: "@id"
    "@type":
    - TypeA
    - TypeB

- id: uri not mapped to @id
  description: |-
    When:

    - A JSON-LD frame with 'uri' in @context not mapped to '@id'.

    Then:

    - A ValueError is raised.
  frame:
    "@context":
      uri: "http://example.com/uri"
    "@type": SomeType

- id: parent uri not mapped to @id
  description: |-
    When:

    - A JSON-LD frame where parent/@context/uri is not mapped to '@id'.

    Then:

    - A ValueError is raised.
  frame:
    "@context":
      uri: "@id"
      parent:
        "@id": "http://www.w3.org/2004/02/skos/core#broader"
        "@container": "@set"
        "@context":
          uri: "http://example.com/uri"
    "@type": SomeType

- id: vocab uri not mapped to @id
  description: |-
    When:

    - A JSON-LD frame where vocab/@context/uri is not mapped to '@id'.

    Then:

    - A ValueError is raised.
  frame:
    "@context":
      uri: "@id"
      vocab:
        "@id": "http://www.w3.org/2004/02/skos/core#inScheme"
        "@container": "@set"
        "@context":
          uri: "http://example.com/uri"
    "@type": SomeType

- id: invalid allowed value for id field
  description: |-
    When:

    - A JSON-LD frame with an invalid allowed value for the id field is used.

    Then:

    - A ValueError is raised indicating that the allowed value for the id field is invalid.
  strict_only: true
  frame:
    "@context":
      rdfs: "http://www.w3.org/2000/01/rdf-schema#"
      uri: "@id"
      id: "http://www.w3.org/2000/01/rdf-schema#label"
    "@type": SomeType
