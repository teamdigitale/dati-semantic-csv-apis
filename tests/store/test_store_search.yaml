---
description: |-
  Given:
  - an APIStore with metadata for multiple vocabularies

  When:
  - I run `search_metadata()` with a query string

  Then:
  - the results match expected items based on the query
  - results are ordered as returned by the query (FTS5 rank or insertion order)
  - an empty results list means zero rows expected

testcases:
- id: match_title_token
  search:
    query: mansione
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: match_description_token
  search:
    query: concausa
  results:
  - agency_id: inail
    key_concept: agente_causale

- id: match_shared_token_both_vocabs
  search:
    query: vocabolario
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico
  - agency_id: inail
    key_concept: agente_causale

- id: match_case_insensitive
  search:
    query: lAVor
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico
  - agency_id: inail
    key_concept: agente_causale

- id: match_case_insensitive_and_agency
  search:
    query: lAVor
    agency_id: inps
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: no_match_unknown_token
  search:
    query: nonexistenttoken
  results: []

- id: limit_reduces_results
  search:
    query: vocabolario
    limit: 1
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: agency_filter_narrows_results
  search:
    query: vocabolario
    agency_id: inps
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: author_substring_match
  search:
    author: inail
  results:
  - agency_id: inail
    key_concept: agente_causale

- id: author_no_match
  search:
    author: nonexistent-org
  results: []

- id: hreflang_match_all
  search:
    hreflang: it
  results:
  - agency_id: inail
    key_concept: agente_causale
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: hreflang_no_match
  search:
    hreflang: en
  results: []

- id: title_substring_match
  search:
    title: classifica
  results:
  - agency_id: inail
    key_concept: agente_causale

- id: title_no_match
  search:
    title: nonexistenttitle
  results: []

- id: author_and_hreflang_combined
  search:
    author: inps
    hreflang: it
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: key_concept_substring_match
  search:
    key_concept: agente
  results:
  - agency_id: inail
    key_concept: agente_causale

- id: key_concept_shared_substring
  search:
    key_concept: lavoratore
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico

- id: key_concept_no_match
  search:
    key_concept: nonexistent
  results: []

- id: total_count
  search:
    query: vocabolario
  results:
  - agency_id: inps
    key_concept: tipo_mansione_lavoratore_domestico
  - agency_id: inail
    key_concept: agente_causale
