---
# Pre-Tabular Asset Generation Workflow
#
# This workflow manages the creation of Frictionless Data Package metadata from RDF vocabularies
# stored in the assets/controlled-vocabularies directory.
#
name: Pre-Tabular Asset Generation
permissions: {}
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      repo:
        description: 'Repository to fetch the cli-binary artifact
          from (owner/repo)'
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
      checkout_ref:
        description: 'Branch/ref to checkout'
        required: false
        type: string
        default: 'assets'
      max_parallel_jobs:
        description: 'Maximum number of parallel jobs to run'
        required: true
        type: number
        default: 1
  push:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**'
    - '.github/workflows/ci-pre-tabular.yml'
  pull_request:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**'
    - '.github/workflows/ci-pre-tabular.yml'
env:
  CI: true
  PYTHON_VERSION: ${{ inputs.python_version || '3.14' }}
  SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha
    }}
  CHECKOUT_REF: ${{ inputs.checkout_ref || 'assets' }}
  VOCABULARY_DIR: 'assets/controlled-vocabularies'
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      assets: ${{ steps.detect.outputs.assets }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Detect changed assets
      id: detect
      shell: bash
      run: |
        set -x
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          RAW_ASSETS=$(find "$VOCABULARY_DIR" -maxdepth 3 -type f -name "*.ttl" -exec dirname {} \; | sort -u)
          echo "Detected assets for manual dispatch:"
          echo "$RAW_ASSETS"
        else
          true # XXX: uncomment
        fi
        if [ -z "$RAW_ASSETS" ]; then
          RAW_ASSETS=$(find "$VOCABULARY_DIR" -type f -name "*.ttl" -exec dirname {} \; | sort -u)
          echo "Fallback RAW_ASSETS:"
          echo "$RAW_ASSETS"
        fi
        FILTERED_ASSETS=()
        for DIR in $RAW_ASSETS; do
        TTL_FILES=($(find "$DIR" -maxdepth 3 -type f -name "*.ttl"))
        COUNT=${#TTL_FILES[@]}
        if [ "$COUNT" -gt 1 ]; then
          echo "::warning::Directory $DIR contains multiple TTL files ($COUNT). Skipping."
        continue
        fi
        FILTERED_ASSETS+=("$DIR")
        done
        ASSETS=$(printf "%s\n" "${FILTERED_ASSETS[@]}" | jq -R -s -c 'split("\n")[:-1]')
        echo "assets=${ASSETS}" >> "$GITHUB_OUTPUT"
        echo "Detected assets: ${ASSETS}"

  ci-pre-tabular:
    needs: detect-changes
    if: needs.detect-changes.outputs.assets != '[]' && needs.detect-changes.outputs.assets
      != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.max_parallel_jobs || 1 }}
      matrix:
        asset: >-
          ${{ fromJson(needs.detect-changes.outputs.assets) }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: true
        ref: ${{ env.CHECKOUT_REF }}
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Download binary artifact
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INPUTS_REPO: ${{ inputs.repo }}
      run: |
        set -e
        REPO="${INPUTS_REPO}"
        echo "Fetching latest workflow run..."
        RUN_ID=$(gh run list \
          --repo "$REPO" \
          --workflow "Test" \
          --limit 1 \
          --json databaseId \
          --jq '.[0].databaseId')
        echo "Latest run ID: ${RUN_ID}"
        if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
          echo "No run found for workflow Test"
          exit 1
        fi
        echo "Downloading artifact..."
        gh run download "$RUN_ID" \
          --repo "$REPO" \
          --name cli-binary \
          --dir /tmp/cli-binary
        cp /tmp/cli-binary/schema_gov_it_tools.bin /usr/local/bin/
        chmod +x /usr/local/bin/schema_gov_it_tools.bin
        /usr/local/bin/schema_gov_it_tools.bin --version

    - name: Debug matrix asset
      run: |
        echo "Processing directory: '${MATRIX_ASSET}'"
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Check frame file exists
      id: check-frame
      working-directory: ${{ matrix.asset }}
      shell: bash
      run: |
        shopt -s nullglob
        FRAME_FILES=( *.frame.yamlld )
        if (( ${#FRAME_FILES[@]} == 0 )); then
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "No .frame.yamlld file found in $(pwd)"
          exit 0
        fi
        FRAME_FILE="${FRAME_FILES[0]}"
        echo "exists=true" >> "$GITHUB_OUTPUT"
        echo "frame_file=$FRAME_FILE" >> "$GITHUB_OUTPUT"
        echo "Found frame file: $FRAME_FILE"

    - name: Warn missing frame
      if: steps.check-frame.outputs.exists == 'false'
      run: |
        echo "::warning title=Missing frame file::No frame file found for asset '${MATRIX_ASSET}'. This asset will be skipped."
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Create datapackage metadata
      if: steps.check-frame.outputs.exists == 'true'
      working-directory: >-
        ${{ matrix.asset }}
      run: |
        ASSET_NAME=$(ls *.ttl 2>/dev/null | sed 's/\.ttl$//')
        /usr/local/bin/schema_gov_it_tools.bin datapackage create \
        --ttl "${ASSET_NAME}.ttl" \
        --frame "${ASSET_NAME}.frame.yamlld" \
        --vocabulary-uri "changeme" \
        --output "datapackage.yaml" \
        --lang it \
        --force
        echo "Generated datapackage.yaml for ${MATRIX_ASSET}"
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Create OAS metadata
      if: steps.check-frame.outputs.exists == 'true'
      working-directory: >-
        ${{ matrix.asset }}
      run: |
        ASSET_NAME=$(ls *.ttl 2>/dev/null | sed 's/\.ttl$//')
        /usr/local/bin/schema_gov_it_tools.bin openapi create \
        --ttl "${ASSET_NAME}.ttl" \
        --frame "${ASSET_NAME}.frame.yamlld" \
        --vocabulary-uri "changeme" \
        --output "${ASSET_NAME}.oas3.yaml" \
        --force
        echo "Generated ${ASSET_NAME}.oas3.yaml for ${MATRIX_ASSET}"
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Commit datapackage & OAS changes
      if: steps.check-frame.outputs.exists == 'true'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "${MATRIX_ASSET}/datapackage.yaml"
        git add "${MATRIX_ASSET}/*.oas3.yaml"
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "ci: generate datapackage for ${MATRIX_ASSET} [skip ci]"
        git push origin HEAD:assets
      env:
        MATRIX_ASSET: ${{ matrix.asset }}
