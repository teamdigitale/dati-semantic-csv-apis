---
# This workflow template runs:
#   - a tox container with tests
#   - a service container (eg. a database) to be used by tox tests.

name: Test

# Github token permissions.
permissions: {}

# Controls when the action will run.
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
    - main
    tags:
    - '*'
    paths-ignore:
    - '**.md'
    - '**.db'
  pull_request:
    branches:
    - main
    paths-ignore:
    - '**.md'
    - '**.db'

env:
  CI: true
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}
  DOCKER_BUILDKIT: "1"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  changes:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft
      == false }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      cli: ${{ steps.set-outputs.outputs.cli }}
      api: ${{ steps.set-outputs.outputs.api }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
      id: filter
      with:
        filters: |
          cli:
            - '!apiv1/**'
          api:
            - '!tests/**'
            - '!tools/**'
            - 'tools/store/**'
    - name: Set outputs (always true for tags)
      id: set-outputs
      env:
        GITHUB_REF: ${{ github.ref }}
        STEPS_FILTER_OUTPUTS_CLI: ${{ steps.filter.outputs.cli
          }}
        STEPS_FILTER_OUTPUTS_API: ${{ steps.filter.outputs.api
          }}
      run: |
        if [[ "${GITHUB_REF}" =~ ^refs/tags/ ]]; then
          echo "cli=true" >> "$GITHUB_OUTPUT"
          echo "api=true" >> "$GITHUB_OUTPUT"
        else
          echo "cli=${STEPS_FILTER_OUTPUTS_CLI}" >> "$GITHUB_OUTPUT"
          echo "api=${STEPS_FILTER_OUTPUTS_API}" >> "$GITHUB_OUTPUT"
        fi

  test-cli:
    needs: changes
    if: ${{ needs.changes.outputs.cli == 'true' }}
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container: python:3.12

    # This stanza deploys a service container with
    #   the "rabbit" hostname. This is commented
    #   to save build time. Uncomment it if you need
    #   it!
    # services:
    #   rabbit:
    #    image: rabbitmq:3-management
    #      ports:
    #      - 5672:5672

    # ...then run the tox jobs referencing
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    #  IMPORTANT!! By default `actions/checkout` just checkouts HEAD, so if you want
    #              to checkout tags and branches too (eg. to auto-version your deployments)
    #              you need to pass the `fetch-depth: 0` option. eg
    #
    #              uses: actions/checkout@v2
    #              with:
    #                fetch-depth: 0
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: >-
        Configure git safe directory, because GITHUB_WORKSPACE
        is owned by a different user than the one running the
        tests.
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Run tests.
      run: |
        pip3 install uv
        pip3 install tox-uv
        tox -e coverage -- -v -m "not asset"
        # tox -e coverage -- -v -m asset
    - name: Build CLI binary
      run: |
        tox -e build
    - name: Upload CLI binary artifact (tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: cli-binary
        path: dist/schema_gov_it_tools.bin
    - name: Upload CLI binary artifact (non-tagged)
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: cli-binary
        path: dist/schema_gov_it_tools.bin
        retention-days: 7

  release-cli:
    needs: test-cli
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false

    - name: Download CLI binary artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: cli-binary

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        gh release create "$REF_NAME" \
          --generate-notes \
          --title "$REF_NAME" \
          schema_gov_it_tools.bin

  test-api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    container: python:3.12
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: >-
        Configure git safe directory, because GITHUB_WORKSPACE
        is owned by a different user than the one running the
        tests.
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Run API tests.
      run: |
        pip3 install uv
        pip3 install tox-uv
        tox -e api -- -vs

  build-containers:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
    - changes
    - test-api
    if: ${{ needs.changes.outputs.api == 'true' }}
    strategy:
      matrix:
        include:
        - target: data-api
          image_suffix: "-data"
          tag_pattern: "^refs/tags/(.+)$"
          force_push_label: push-container:api  # Label prefix to force push the image in pull request
    name: Docker Build ${{ matrix.target }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false

    - name: Log in to the Github Container registry
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  # v3.6.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check if should build
      id: should_build
      env:
        GITHUB_REF: ${{ github.ref }}
      run: |
        set -euo pipefail
        # GITHUB_REF is a GitHub-controlled variable with format: refs/heads/*, refs/tags/*, refs/pull/*/merge
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "pull_request" ]] || [[ "${GITHUB_REF}" =~ ${{ matrix.tag_pattern }} ]]; then
          echo "build=true" >> "$GITHUB_OUTPUT"
        else
          echo "build=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine version
      id: version
      if: steps.should_build.outputs.build == 'true'
      env:
        GITHUB_REF: ${{ github.ref }}
        UNTRUSTED_GITHUB_REF_NAME: ${{ github.ref_name }}  # E.g. my-app@1.0.0 - Always populated; contains the branch name, tag name, or ref name depending on the event type.
      run: |
        # set -euo pipefail
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          VERSION="latest"
        elif [[ "${GITHUB_REF}" =~ ${{ matrix.tag_pattern }} ]]; then
          VERSION="${UNTRUSTED_GITHUB_REF_NAME#*@}" # Strip the prefix from the tag name in order to get the tag version only
        fi
        echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Extract metadata
      id: meta
      if: steps.should_build.outputs.build == 'true'
      uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f  # v5.8.0
      with:
        images: >-
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}${{
          matrix.image_suffix }}
        labels: |
          maintainer=teamdigitale
          org.opencontainers.image.title=${{ env.IMAGE_NAME_PREFIX }}${{ matrix.image_suffix }}
        tags: |
          type=raw,value={{date 'YYYYMMDD'}}-${{github.run_number}}-{{sha}}
          type=raw,value=${{ steps.version.outputs.value }},enable=${{ steps.version.outputs.value != '' }}

    - name: Build and push
      if: steps.should_build.outputs.build == 'true'
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
      with:
        context: .
        file: apiv1/Dockerfile
        target: ${{ matrix.target }}
        push: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name,
          matrix.force_push_label) }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
    - build-containers
    strategy:
      matrix:
        include:
        - target: data-api
          image_suffix: "-data"
    name: Cleanup Docker Images ${{ matrix.target }}
    steps:
    - name: Cleanup Docker Images
      uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55  # v5
      continue-on-error: true
      with:
        package-name: >-
          ${{ env.IMAGE_NAME_PREFIX }}${{ matrix.image_suffix
          }}
        package-type: "container"
        min-versions-to-keep: 10
        ignore-versions: "(latest|^[0-9]+\\.[0-9]+\\.[0-9]+$)"
