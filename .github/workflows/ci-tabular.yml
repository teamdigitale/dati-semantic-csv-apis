---
# Tabular Asset Generation Workflow
#
# This workflow manages the generation of CSV files from RDF vocabularies
# and existing datapackage metadata.
#
name: Tabular Asset Generation
permissions: {}
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
      checkout_ref:
        description: 'Branch/ref to checkout'
        required: false
        type: string
        default: 'assets'
      max_parallel_jobs:
        description: 'Maximum number of parallel jobs to run'
        required: true
        type: number
        default: 1
      frame_prefix:
        description: 'Prefix appended to asset name when resolving
          the frame file (e.g. -csv → <asset>-csv.frame.yamlld).
          Leave empty for the default <asset>.frame.yamlld.'
        required: false
        type: string
        default: ''
      assets:
        description: 'JSON array of asset paths to process. If
          provided, skips change detection and processes exactly
          these assets.'
        required: false
        type: string
        default: ''
  push:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**/datapackage.yaml'
    - 'assets/controlled-vocabularies/**/*.ttl'
    - '.github/workflows/ci-tabular.yml'
  pull_request:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**/datapackage.yaml'
    - 'assets/controlled-vocabularies/**/*.ttl'
    - '.github/workflows/ci-tabular.yml'
env:
  CI: true
  PYTHON_VERSION: ${{ inputs.python_version || '3.14' }}
  CLI_VERSION: '0.0.14'
  SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha
    }}
  CHECKOUT_REF: ${{ inputs.checkout_ref || 'assets' }}
  VOCABULARY_DIR: 'assets/controlled-vocabularies'
  FRAME_PREFIX: ${{ inputs.frame_prefix || '' }}
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      assets: ${{ steps.detect.outputs.assets }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 0
        ref: ${{ env.CHECKOUT_REF }}
    - name: Detect changed assets
      id: detect
      shell: bash
      run: |
        set -euo pipefail
        # If assets were provided by the caller, use them directly.
        PROVIDED_ASSETS='${{ inputs.assets }}'
        if [ -n "${PROVIDED_ASSETS}" ] && [ "${PROVIDED_ASSETS}" != "[]" ]; then
          echo "assets=${PROVIDED_ASSETS}" >> "$GITHUB_OUTPUT"
          echo "Using provided assets: ${PROVIDED_ASSETS}"
          exit 0
        fi

        EVENT="${{ github.event_name }}"

        mapfile -t ALL_DIRS < <(find "$VOCABULARY_DIR" -type f -name "*.ttl" -exec dirname {} \; | sort -u)

        FILTERED_DIRS=()
        for DIR in "${ALL_DIRS[@]}"; do
          mapfile -t TTL_FILES < <(find "$DIR" -maxdepth 3 -type f -name "*.ttl")
          COUNT=${#TTL_FILES[@]}
          if [ "$COUNT" -gt 1 ]; then
            echo "::warning::Directory $DIR contains $COUNT TTL files. Skipping."
            continue
          fi
          FILTERED_DIRS+=("$DIR")
        done

        CHANGED_FILES=""
        BASE_SHA=""
        if [ "$EVENT" != "workflow_dispatch" ]; then
          if [ "$EVENT" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=""
            fi
          fi
        fi
        if [ -n "${BASE_SHA}" ]; then
          CHANGED_FILES=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" -- "${VOCABULARY_DIR}/" 2>/dev/null || true)
        fi

        ASSETS_JSON="["
        FIRST=true
        for DIR in "${FILTERED_DIRS[@]}"; do
          if [ -n "${BASE_SHA}" ]; then
            RELEVANT=$(echo "$CHANGED_FILES" | grep -cE "^${DIR}/.*(\.ttl|\.frame\.yamlld|datapackage\.yaml)$" || true)
            if [ "$RELEVANT" -eq 0 ]; then
              continue
            fi
          fi
          if [ "$FIRST" = "false" ]; then ASSETS_JSON+=","; fi
          ASSETS_JSON+="\"${DIR}\""
          FIRST=false
        done
        ASSETS_JSON+="]"
        echo "assets=${ASSETS_JSON}" >> "$GITHUB_OUTPUT"
        echo "Detected assets: ${ASSETS_JSON}"

  ci-tabular:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.max_parallel_jobs || 1 }}
      matrix:
        asset: >-
          ${{ fromJson(needs.detect-changes.outputs.assets) }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: true
        ref: ${{ env.CHECKOUT_REF }}
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Download schema_gov_it_tools.bin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        ARTIFACT_URL=https://github.com/teamdigitale/dati-semantic-csv-apis/releases/download/${{ env.CLI_VERSION }}/schema_gov_it_tools.bin
        curl -L "${ARTIFACT_URL}" -o /usr/local/bin/schema_gov_it_tools.bin
        chmod +x /usr/local/bin/schema_gov_it_tools.bin
        echo "Downloaded schema_gov_it_tools.bin version $(/usr/local/bin/schema_gov_it_tools.bin --version)"
    - name: Check datapackage exists
      id: check-datapackage
      working-directory: ${{ matrix.asset }}
      run: |
        if [ -f "datapackage.yaml" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=Missing datapackage::datapackage.yaml not found in ${{ matrix.asset }}, skipping CSV generation"
        fi

    - name: Check frame file exists
      id: check-frame
      working-directory: ${{ matrix.asset }}
      shell: bash
      run: |
        shopt -s nullglob
        FRAME_FILES=( *.frame.yamlld )
        if (( ${#FRAME_FILES[@]} == 0 )); then
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "No .frame.yamlld file found in $(pwd)"
          exit 0
        fi
        FRAME_FILE="${FRAME_FILES[0]}"
        echo "exists=true" >> "$GITHUB_OUTPUT"
        echo "frame_file=$FRAME_FILE" >> "$GITHUB_OUTPUT"
        echo "Found frame file: $FRAME_FILE"

    - name: Warn missing frame
      if: steps.check-frame.outputs.exists == 'false'
      run: |
        echo "::warning title=Missing frame file::No frame file found for asset '${MATRIX_ASSET}'. This asset will be skipped."
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Generate and validate CSV
      if: steps.check-datapackage.outputs.exists == 'true' &&
        steps.check-frame.outputs.exists == 'true' && !contains(matrix.asset,
        'theme-subtheme-mapping')
      working-directory: >-
        ${{ matrix.asset }}
      run: |
        ASSET_NAME=$(ls *.ttl 2>/dev/null | sed 's/\.ttl$//')
        # Generate CSV from JSON-LD and datapackage
        /usr/local/bin/schema_gov_it_tools.bin \
          jsonld create \
          --ttl "${ASSET_NAME}.ttl" \
          --frame "${ASSET_NAME}${FRAME_PREFIX}.frame.yamlld" \
          --vocabulary-uri changeme \
          --frame-only \
          --output "${ASSET_NAME}${FRAME_PREFIX}.data.yamlld" --force
        /usr/local/bin/schema_gov_it_tools.bin \
           csv create \
          --jsonld "${ASSET_NAME}${FRAME_PREFIX}.data.yamlld" \
          --datapackage datapackage.yaml \
          --force
        # Validate the CSV
        /usr/local/bin/schema_gov_it_tools.bin \
          csv validate \
          --ttl "${ASSET_NAME}.ttl" \
          --datapackage datapackage.yaml \
          --vocabulary-uri changeme
        echo "Generated and validated CSV for ${MATRIX_ASSET}"
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Check for CSV files
      id: check-csv
      if: steps.check-datapackage.outputs.exists == 'true' &&
        !contains(matrix.asset, 'theme-subtheme-mapping')
      working-directory: >-
        ${{ matrix.asset }}
      run: |
        if ls *.csv 1> /dev/null 2>&1; then
          echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          CSV_FILE=$(ls *.csv | head -1)
          echo "csv_file=$CSV_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "csv_exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Pull Request
      if: steps.check-csv.outputs.csv_exists == 'true'
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
      with:
        base: >-
          ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref
          || github.ref_name }}
        commit-message: >-
          feat: add generated CSV for ${{ matrix.asset }} [skip
          ci]
        title: >-
          feat: CSV regeneration for ${{ matrix.asset }}
        body: |
          # CSV Regeneration for ${{ matrix.asset }}

          This PR contains the auto-generated CSV file for the `${{ matrix.asset }}` controlled vocabulary.

          ## Generated Files
          - `${{ env.VOCABULARY_DIR }}/${{ matrix.asset }}/${{ steps.check-csv.outputs.csv_file }}`

          ## Validation
          The CSV has been generated from the RDF vocabulary and validated against the datapackage metadata.

          Generated by the [Tabular Asset Generation workflow](.github/workflows/ci-tabular.yml).
