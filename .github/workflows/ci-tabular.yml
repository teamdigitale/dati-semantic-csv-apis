---
# Tabular Asset Generation Workflow
#
# This workflow manages the generation of CSV files from RDF vocabularies
# and existing datapackage metadata.
#
name: Tabular Asset Generation
permissions: {}
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      repo:
        description: 'Repository to fetch the cli-binary artifact
          from (owner/repo)'
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
      checkout_ref:
        description: 'Branch/ref to checkout'
        required: false
        type: string
        default: 'assets'
      max_parallel_jobs:
        description: 'Maximum number of parallel jobs to run'
        required: true
        type: number
        default: 1
  push:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**/datapackage.yaml'
    - 'assets/controlled-vocabularies/**/*.ttl'
    - '.github/workflows/ci-tabular.yml'
  pull_request:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**/datapackage.yaml'
    - 'assets/controlled-vocabularies/**/*.ttl'
    - '.github/workflows/ci-tabular.yml'
env:
  CI: true
  PYTHON_VERSION: ${{ inputs.python_version || '3.14' }}
  SOURCE_REF: ${{ github.event.pull_request.head.sha || github.sha
    }}
  CHECKOUT_REF: ${{ inputs.checkout_ref || 'assets' }}
  VOCABULARY_DIR: 'assets/controlled-vocabularies'
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      assets: ${{ steps.detect.outputs.assets }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Detect changed assets
      id: detect
      shell: bash
      run: |
        set -x
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          RAW_ASSETS=$(find "$VOCABULARY_DIR" -maxdepth 3 -type f -name "*.ttl" -exec dirname {} \; | sort -u)
          echo "Detected assets for manual dispatch:"
          echo "$RAW_ASSETS"
        else
          true # XXX: uncomment
        fi
        if [ -z "$RAW_ASSETS" ]; then
          RAW_ASSETS=$(find "$VOCABULARY_DIR" -type f -name "*.ttl" -exec dirname {} \; | sort -u)
          echo "Fallback RAW_ASSETS:"
          echo "$RAW_ASSETS"
        fi
        FILTERED_ASSETS=()
        for DIR in $RAW_ASSETS; do
        TTL_FILES=($(find "$DIR" -maxdepth 3 -type f -name "*.ttl"))
        COUNT=${#TTL_FILES[@]}
        if [ "$COUNT" -gt 1 ]; then
          echo "::warning::Directory $DIR contains multiple TTL files ($COUNT). Skipping."
        continue
        fi
        FILTERED_ASSETS+=("$DIR")
        done
        ASSETS=$(printf "%s\n" "${FILTERED_ASSETS[@]}" | jq -R -s -c 'split("\n")[:-1]')
        echo "assets=${ASSETS}" >> "$GITHUB_OUTPUT"
        echo "Detected assets: ${ASSETS}"

  ci-tabular:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.max_parallel_jobs || 1 }}
      matrix:
        asset: >-
          ${{ fromJson(needs.detect-changes.outputs.assets) }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: true
        ref: ${{ env.CHECKOUT_REF }}
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Download binary artifact
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INPUTS_REPO: ${{ inputs.repo }}
      run: |
        set -e
        REPO="${INPUTS_REPO}"
        echo "Fetching latest workflow run..."
        RUN_ID=$(gh run list \
          --repo "$REPO" \
          --workflow "Test" \
          --limit 1 \
          --json databaseId \
          --jq '.[0].databaseId')
        echo "Latest run ID: ${RUN_ID}"
        if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
          echo "No run found for workflow Test"
          exit 1
        fi
        echo "Downloading artifact..."
        gh run download "$RUN_ID" \
          --repo "$REPO" \
          --name cli-binary \
          --dir /tmp/cli-binary
        cp /tmp/cli-binary/schema_gov_it_tools.bin /usr/local/bin/
        chmod +x /usr/local/bin/schema_gov_it_tools.bin
        /usr/local/bin/schema_gov_it_tools.bin --version

    - name: Check datapackage exists
      id: check-datapackage
      working-directory: ${{ matrix.asset }}
      run: |
        if [ -f "datapackage.yaml" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "datapackage.yaml not found, skipping CSV generation"
        fi

    - name: Check frame file exists
      id: check-frame
      working-directory: ${{ matrix.asset }}
      shell: bash
      run: |
        shopt -s nullglob
        FRAME_FILES=( *.frame.yamlld )
        if (( ${#FRAME_FILES[@]} == 0 )); then
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "No .frame.yamlld file found in $(pwd)"
          exit 0
        fi
        FRAME_FILE="${FRAME_FILES[0]}"
        echo "exists=true" >> "$GITHUB_OUTPUT"
        echo "frame_file=$FRAME_FILE" >> "$GITHUB_OUTPUT"
        echo "Found frame file: $FRAME_FILE"

    - name: Warn missing frame
      if: steps.check-frame.outputs.exists == 'false'
      run: |
        echo "::warning title=Missing frame file::No frame file found for asset '${MATRIX_ASSET}'. This asset will be skipped."
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Generate and validate CSV
      if: steps.check-datapackage.outputs.exists == 'true' &&
        steps.check-frame.outputs.exists == 'true' && !contains(matrix.asset,
        'theme-subtheme-mapping')
      working-directory: >-
        ${{ matrix.asset }}
      run: |
        ASSET_NAME=$(ls *.ttl 2>/dev/null | sed 's/\.ttl$//')
        # Generate CSV from JSON-LD and datapackage
        /usr/local/bin/schema_gov_it_tools.bin \
          jsonld create \
          --ttl "${ASSET_NAME}.ttl" \
          --frame "${ASSET_NAME}.frame.yamlld" \
          --vocabulary-uri changeme \
          --frame-only \
          --output "${ASSET_NAME}.data.yamlld" --force
        /usr/local/bin/schema_gov_it_tools.bin \
           csv create \
          --jsonld "${ASSET_NAME}.data.yamlld" \
          --datapackage datapackage.yaml \
          --force
        # Validate the CSV
        /usr/local/bin/schema_gov_it_tools.bin \
          csv validate \
          --ttl "${ASSET_NAME}.ttl" \
          --datapackage datapackage.yaml \
          --vocabulary-uri changeme
        echo "Generated and validated CSV for ${MATRIX_ASSET}"
      env:
        MATRIX_ASSET: ${{ matrix.asset }}

    - name: Check for CSV files
      id: check-csv
      if: steps.check-datapackage.outputs.exists == 'true' &&
        !contains(matrix.asset, 'theme-subtheme-mapping')
      working-directory: >-
        ${{ matrix.asset }}
      run: |
        if ls *.csv 1> /dev/null 2>&1; then
          echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          CSV_FILE=$(ls *.csv | head -1)
          echo "csv_file=$CSV_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "csv_exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Pull Request
      if: steps.check-csv.outputs.csv_exists == 'true'
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
      with:
        base: ${{ env.CHECKOUT_REF }}
        commit-message: >-
          feat: add generated CSV for ${{ matrix.asset }}
        title: >-
          feat: CSV generation for ${{ matrix.asset }}
        body: |
          # CSV Generation for ${{ matrix.asset }}

          This PR contains the auto-generated CSV file for the `${{ matrix.asset }}` controlled vocabulary.

          ## Generated Files
          - `${{ env.VOCABULARY_DIR }}/${{ matrix.asset }}/${{ steps.check-csv.outputs.csv_file }}`

          ## Validation
          The CSV has been generated from the RDF vocabulary and validated against the datapackage metadata.

          Generated by the [Tabular Asset Generation workflow](.github/workflows/ci-tabular.yml).
