---
#
# This workflow detects which file types changed per asset and runs:
#   - jsonld create   if .ttl or .frame.yamlld changed
#   - apistore create if .ttl, .frame.yamlld, .oas3.yaml, or .data.yaml changed
#
# Logic:
#   .ttl or .frame.yamlld changed  →  jsonld create + apistore create
#   .oas3.yaml changed             →  apistore create only
#   .data.yaml changed             →  apistore create only
#   nothing relevant changed       →  skip asset
#
name: CI APIStore Create
permissions: {}
on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
  workflow_dispatch:
  push:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**'
    - '.github/workflows/apistore-generation.yml'
  pull_request:
    branches:
    - assets
    paths:
    - 'assets/controlled-vocabularies/**'
    - '.github/workflows/apistore-generation.yml'
env:
  CI: true
  PYTHON_VERSION: ${{ inputs.python_version }}
  VOCABULARY_DIR: 'assets/controlled-vocabularies'
  CLI_VERSION: '0.0.13'
jobs:
  #
  # Job 1: Detect which assets changed and what type of files changed.
  #   Outputs a JSON array of objects: [{path, needs_jsonld, needs_apistore}, ...]
  #
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      assets: ${{ steps.detect.outputs.assets }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 0
    - name: Detect changed assets with change type
      id: detect
      shell: bash
      run: |
        set -euo pipefail
        EVENT="${{ github.event_name }}"

        # Collect all valid asset directories (each must contain exactly one .ttl)
        mapfile -t ALL_DIRS < <(find "$VOCABULARY_DIR" -type f -name "*.ttl" -exec dirname {} \; | sort -u)

        FILTERED_DIRS=()
        for DIR in "${ALL_DIRS[@]}"; do
          mapfile -t TTL_FILES < <(find "$DIR" -maxdepth 3 -type f -name "*.ttl")
          COUNT=${#TTL_FILES[@]}
          if [ "$COUNT" -gt 1 ]; then
            echo "::warning::Directory $DIR contains $COUNT TTL files. Skipping."
            continue
          fi
          FILTERED_DIRS+=("$DIR")
        done

        # Determine the set of changed files (empty for workflow_dispatch → process all)
        CHANGED_FILES=""
        if [ "$EVENT" != "workflow_dispatch" ]; then
          if [ "$EVENT" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            # New branch: treat all files as changed
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=""
            fi
          fi

          if [ -n "${BASE_SHA:-}" ]; then
            CHANGED_FILES=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" -- "${VOCABULARY_DIR}/" 2>/dev/null || true)
          fi
        fi

        # Build JSON array
        RESULT_JSON="["
        FIRST=true

        for DIR in "${FILTERED_DIRS[@]}"; do
          if [ "$EVENT" = "workflow_dispatch" ] || [ -z "${BASE_SHA:-}" ]; then
            NEEDS_JSONLD=true
            NEEDS_APISTORE=true
          else
            TTL_CHANGED=$(echo "$CHANGED_FILES"   | grep -c "^${DIR}/.*\.ttl$"              || true)
            FRAME_CHANGED=$(echo "$CHANGED_FILES" | grep -c "^${DIR}/.*\.frame\.yamlld$"    || true)
            OAS3_CHANGED=$(echo "$CHANGED_FILES"  | grep -c "^${DIR}/.*\.oas3\.yaml$"       || true)
            DATA_CHANGED=$(echo "$CHANGED_FILES"  | grep -cE "^${DIR}/.*\.data\.yaml(ld)?$" || true)

            if [ "$TTL_CHANGED" -gt 0 ] || [ "$FRAME_CHANGED" -gt 0 ]; then
              NEEDS_JSONLD=true
              NEEDS_APISTORE=true
            elif [ "$OAS3_CHANGED" -gt 0 ] || [ "$DATA_CHANGED" -gt 0 ]; then
              NEEDS_JSONLD=false
              NEEDS_APISTORE=true
            else
              # No relevant changes in this asset directory
              continue
            fi
          fi

          if [ "$FIRST" = "false" ]; then
            RESULT_JSON+=","
          fi
          RESULT_JSON+="{\"path\":\"${DIR}\",\"needs_jsonld\":${NEEDS_JSONLD},\"needs_apistore\":${NEEDS_APISTORE}}"
          FIRST=false
        done

        RESULT_JSON+="]"
        echo "assets=${RESULT_JSON}" >> "$GITHUB_OUTPUT"
        echo "Detected assets: ${RESULT_JSON}"

  #
  # Job 2: For each changed asset, run jsonld create and/or apistore create
  #   based on what changed, then open a PR with the regenerated artifacts.
  #
  ci-api:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        asset: >-
          ${{ fromJson(needs.detect-changes.outputs.assets) }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: true
        ref: assets
        fetch-depth: 0
    - name: Fetch source files from triggering commit
      run: |
        git fetch origin ${{ github.sha }}
        git checkout ${{ github.sha }} -- "${{ matrix.asset.path }}"
      env:
        MATRIX_ASSET: ${{ matrix.asset.path }}
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Download schema_gov_it_tools.bin
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        ARTIFACT_URL=https://github.com/teamdigitale/dati-semantic-csv-apis/releases/download/${{ env.CLI_VERSION }}/schema_gov_it_tools.bin
        curl -L "${ARTIFACT_URL}" -o /usr/local/bin/schema_gov_it_tools.bin
        chmod +x /usr/local/bin/schema_gov_it_tools.bin
        echo "Downloaded schema_gov_it_tools.bin version $(/usr/local/bin/schema_gov_it_tools.bin --version)"
    - name: Check required files exist
      id: check-files
      working-directory: ${{ matrix.asset.path }}
      shell: python {0}
      run: |
        import glob, os
        github_output = os.environ["GITHUB_OUTPUT"]
        with open(github_output, "a") as f:
            for pattern, key, file_key in [
                ("*.oas3.yaml",    "oas3_exists",  "oas3_file"),
                ("*.frame.yamlld", "frame_exists", "frame_file"),
                ("*.ttl",          "ttl_exists",   "ttl_file"),
                ("*.data.yaml",    "data_exists",  "data_file"),
            ]:
                files = glob.glob(pattern)
                if files:
                    f.write(f"{key}=true\n")
                    f.write(f"{file_key}={files[0]}\n")
                    print(f"Found {pattern}: {files[0]}")
                else:
                    f.write(f"{key}=false\n")
                    print(f"::warning title=Missing file::No {pattern} found in {os.getcwd()}")
    - name: Run jsonld create
      if: >-
        matrix.asset.needs_jsonld &&
        steps.check-files.outputs.ttl_exists == 'true' &&
        steps.check-files.outputs.frame_exists == 'true' &&
        !contains(matrix.asset.path, 'theme-subtheme-mapping')
      working-directory: ${{ matrix.asset.path }}
      run: |
        set -e
        ASSET_NAME=$(find . -maxdepth 1 -name "*.ttl" -printf "%f\n" | sed 's/\.ttl$//')

        # Extract vocabulary URI from the default @prefix : declaration (strip trailing slash)
        VOCAB_URI=$(grep "^@prefix : " "${ASSET_NAME}.ttl" \
          | sed "s|@prefix : <||;s|/*> \. *$||" \
          | tr -d '[:space:]')
        echo "Vocabulary URI: ${VOCAB_URI}"

        /usr/local/bin/schema_gov_it_tools.bin \
          jsonld create \
          --ttl "${ASSET_NAME}.ttl" \
          --frame "${ASSET_NAME}.frame.yamlld" \
          --vocabulary-uri "${VOCAB_URI}" \
          --output "${ASSET_NAME}.data.yaml" \
          --force
    - name: Run apistore create
      if: >-
        matrix.asset.needs_apistore &&
        steps.check-files.outputs.oas3_exists == 'true' &&
        steps.check-files.outputs.frame_exists == 'true' &&
        !contains(matrix.asset.path, 'theme-subtheme-mapping')
      working-directory: ${{ matrix.asset.path }}
      run: |
        set -e
        ASSET_NAME=$(find . -maxdepth 1 -name "*.ttl" -printf "%f\n" | sed 's/\.ttl$//')

        /usr/local/bin/schema_gov_it_tools.bin \
          apistore create \
          --ttl "${ASSET_NAME}.ttl" \
          --jsonld "${ASSET_NAME}.data.yaml" \
          --oas "${ASSET_NAME}.oas3.yaml" \
          --output "${ASSET_NAME}.db" --force

        echo "Generated DB for ${ASSET_NAME}"
      env:
        MATRIX_ASSET: ${{ matrix.asset.path }}
    - name: Check for DB files
      id: check-db
      if: >-
        matrix.asset.needs_apistore &&
        steps.check-files.outputs.oas3_exists == 'true' &&
        !contains(matrix.asset.path, 'theme-subtheme-mapping')
      working-directory: ${{ matrix.asset.path }}
      run: |
        if find . -maxdepth 1 -name "*.db" | grep -q .; then
          echo "db_exists=true" >> "$GITHUB_OUTPUT"
          DB_FILE=$(find . -maxdepth 1 -name "*.db" -printf "%f\n" | head -1)
          echo "db_file=$DB_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "db_exists=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Create Pull Request
      if: steps.check-db.outputs.db_exists == 'true'
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
      with:
        base: assets
        commit-message: >-
          feat: regenerate artifacts for ${{ matrix.asset.path
          }}
        title: >-
          feat: artifact regeneration for ${{ matrix.asset.path
          }}
        body: |
          # Artifact Regeneration for `${{ matrix.asset.path }}`

          This PR contains the auto-regenerated artifacts for the `${{ matrix.asset.path }}` controlled vocabulary.

          ## Triggered by changes to
          - `.ttl` / `.frame.yamlld` → `jsonld create` + `apistore create`
          - `.oas3.yaml` / `.data.yaml` → `apistore create` only

          ## Generated Files
          - `${{ matrix.asset.path }}/${{ steps.check-db.outputs.db_file }}`

          Generated by the [CI APIStore Create workflow](.github/workflows/apistore-generation.yml).
        branch: >-
          feat/apistore-generation${{ matrix.asset.path }}
        delete-branch: true
        labels: 'automated,apistore-generation'
