description: 'Il tesauro per la categorizzazione degli ambiti disciplinari nasce per
  individuare delle categorie generali sotto cui indicizzare i luoghi e gli eventi
  della cultura, per facilitare la ricerca e la navigazione delle informazioni da
  parte degli utenti.

  Le fonti alla base dell’individuazione delle categorie sono l’elenco dei settori
  scientifico-disciplinari individuati dal D. M. 4 ottobre 2000 (http://www.miur.it/UserFiles/115.htm),
  il Thesaurus Pico (http://www.culturaitalia.it/pico/thesaurus/4.3/thesaurus_4.3.0.skos.xml)
  e il Nuovo Soggettario di Firenze (http://thes.bncf.firenze.sbn.it/ricerca.php).

  Generalmente si è deciso di utilizzare come fonte della categorizzazione l’elenco
  MIUR dei settori scientifico-disciplinari (con alcune integrazioni dagli altri Thesauri),
  ad eccezione dell’ambito Arte, per il quale si è ripresa la suddivisione proposta
  da Pico http://culturaitalia.it/pico/thesaurus/4.1#arte (cfr. Thesaurus Pico - cosa
  - aree disciplinari – arte, con le relative suddivisioni in arti applicate, arti
  visive, arti dello spettacolo), che permette di rappresentare la complessità dei
  beni artistici con maggiore precisione.

  Le categorie sono state strutturate su tre livelli di specializzazione progressiva,
  a partire da un primo livello che racchiude 25 macroaree, per arrivare al terzo
  livello che prevede una specializzazione disciplinare più capillare.

  Ogni categoria individuata a partire dalla denominazione del MIUR dei settori scientifico-disciplinari
  è allineata in maniera "debole", dove possibile, con gli Uri dei termini corrispondenti
  in PICO  e nel Nuovo Soggettario di Firenze.

  La versione inglese dei termini del vocabolario è stata ottenuta, per le voci del
  MIUR, dal sito del CUN (Consiglio Universitario Nazionale); per le voci del tesauro
  PICO, dalla sua versione RDF/XML.

  Nel processo di mapping automatico, su un totale di 447 voci del vocabolario controllato
  si è trovata perfetta corrispondenza in 422 voci, con 9 duplicazioni, cioè in 9
  voci sono state inserite due traduzioni distinte in inglese, una da fonte MIUR e
  una da fonte PICO, per un totale di 413 traduzioni singole. Le 34 voci rimanenti
  sono state tradotte manualmente.'
