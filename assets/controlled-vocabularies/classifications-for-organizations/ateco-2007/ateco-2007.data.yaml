- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa classe include servizi ospedalieri a breve o lungo termine,
    ossia attività  sanitarie, diagnostiche e di trattamento, svolte in ospedali generici
    (ad esempio ospedali territoriali o regionali, organizzazioni ospedaliere senza
    scopo di lucro, ospedali universitari, ospedali militari e negli istituti penali)
    e in ospedali specialistici (esempio ospedali e case di cura psichiatrici e per
    la disintossicazione, ospedali per il trattamento delle malattie infettive, cliniche
    ostetriche, sanatori specialistici). Le attività  riguardano principalmente i
    pazienti ricoverati e sono svolte sotto il diretto controllo dei medici ed includono:
    servizi del personale medico e paramedico; servizi dei laboratori e delle strutture
    tecniche, inclusi i servizi di radiologia e di anestesia; servizi del pronto soccorso,
    attività  delle sale operatorie, di distribuzione di medicinali, pasti ed altri
    servizi ospedalieri; servizi dei centri di consulenza familiare che forniscono
    trattamenti specifici quali la sterilizzazione o l''in'
  id: '86.10'
  label_it: Servizi ospedalieri
