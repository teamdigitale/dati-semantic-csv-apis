- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include la produzione di tronchi (tondame) per le
    industrie del settore cosà¬ come l''estrazione e la raccolta di altri materiali
    dalle foreste e dai boschi incolti. Oltre alla produzione di tronchi (tondame)
    le attività  forestali danno prodotti che vengono sottoposti ad una minima lavorazione,
    quali la legna da ardere, il carbone, o il legname triturato e i tronchi (tondame)
    utilizzati in forma non lavorata (per esempio, puntelli per miniere, pasta di
    cellulosa eccetera). Queste attività  possono essere effettuate in foreste naturali
    o create dall''uomo.

    àˆ escluso ogni ulteriore trattamento del legno a cominciare dal taglio e dalla
    piallatura, cfr. divisione 16.'
