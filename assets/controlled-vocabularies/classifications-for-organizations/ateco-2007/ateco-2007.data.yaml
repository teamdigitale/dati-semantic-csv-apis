- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include i lavori di costruzione specializzati, ovvero,
    la costruzione di parti di edifici, i lavori di ingegneria civile e le attività 
    di preparazione a tale scopo. Si tratta solitamente di attività  specializzate
    in un aspetto comune a diversi tipi di strutture, che richiedono competenze o
    attrezzature specializzate, quali l''infissione di pali, i lavori di fondazione,
    i lavori di ossatura di edifici e di strutture in calcestruzzo, la posa in opera
    di mattoni e pietre, il montaggio di ponteggi, la copertura di tetti eccetera.
    àˆ inclusa la costruzione di strutture in acciaio a condizione che le varie parti
    non siano prodotte dalla stessa unità  che le pone in opera. Tali attività  sono
    effettuate prevalentemente in subappalto.

    Sono anche incluse le attività  di finitura e completamento degli edifici.

    Sono inoltre incluse le attività  di installazione di tutti i tipi di servizi,
    necessarie al funzionamento della costruzione. Tali attività  vengono generalmente
    realizzate in cantiere, anche se alcune parti del lavoro possono essere eseguite
    esternamente in officine specializzate. Ne fanno parte l''installazione di impianti
    idraulico-sanitari, di riscaldamento e condizionamento dell''aria, di antenne,
    di sistemi di allarme e di altri apparati elettrici, di sistemi antincendio, di
    ascensori e scale mobili eccetera. Sono inoltre compresi i lavori di isolamento
    (per umidità , calore, rumore), i lavori di rivestimento metallico, l''installazione
    di impianti di illuminazione e segnaletica per strade, ferrovie, aeroporti, porti
    eccetera. Sono inoltre incluse tutte le attività  di riparazione dei lavori citati.

    Il noleggio di attrezzature per la costruzione con manovratore à¨ classificato
    fra i lavori di costruzione specializzati effettuati con queste attrezzature.

    I lavori di completamento comprendono le attività  che contribuiscono alla finitura
    di una costruzione quali posa in opera di vetrate, intonacatura, tinteggiatura
    e imbiancatura, lavori di rivestimento di muri e pavimenti o di rivestimento con
    altri materiali quali parquet, moquette, carta da parati eccetera, levigatura
    di pavimenti, lavori di carpenteria per finitura, lavori di isolamento acustico
    eccetera. Sono inoltre incluse tutte le attività  di riparazione dei lavori citati.'
  id: '43'
  label_it: LAVORI DI COSTRUZIONE SPECIALIZZATI
