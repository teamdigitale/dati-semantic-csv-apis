  definition: 'Questa classe include esercizi la cui attività  prevalente à¨ la:

    vendita al dettaglio di una grande varietà  di articoli, fra i quali predominano
    i prodotti alimentari e le bevande: attività  di esercizi generici che, oltre
    alla vendita predominante di prodotti alimentari e bevande, offrono diverse altre
    linee di prodotti, come ad esempio: articoli di abbigliamento, mobili, piccoli
    elettrodomestici, ferramenta, cosmetici eccetera.'
