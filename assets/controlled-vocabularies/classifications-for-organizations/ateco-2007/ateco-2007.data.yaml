  definition: Questa divisione include la fabbricazione di computer, periferiche informatiche,
    apparecchi di telecomunicazione, e prodotti di elettronica simili, come pure la
    fabbricazione di componenti di tali prodotti. I processi di produzione di questa
    divisione sono caratterizzati dalla progettazione e l'impiego di circuiti integrati
    e dall'applicazione di tecnologie di miniaturizzazione ad elevata specializzazione.
    La divisione include anche la fabbricazione di prodotti di elettronica di consumo
    audio e video, strumenti di misurazione, di navigazione e controllo, strumenti
    per l'irradiazione, apparecchi elettromedicali ed elettroterapeutici, strumenti
    ed apparecchiature ottiche, nonchà© la fabbricazione di supporti magnetici ed
    ottici.
  id: '26'
  label_it: FABBRICAZIONE DI COMPUTER E PRODOTTI DI ELETTRONICA E OTTICA; APPARECCHI
    ELETTROMEDICALI, APPARECCHI DI MISURAZIONE E DI OROLOGI
