- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include la pesca e l''acquacoltura, e comprende lo
    sfruttamento delle risorse ittiche da ambienti marini, salmastri o d''acqua dolce,
    allo scopo di catturare o raccogliere pesci, crostacei, molluschi o altri organismi
    marini (per esempio, alghe, perle, spugne eccetera). Sono incluse anche le attività 
    che normalmente rientrano nel processo di produzione in proprio (per esempio,
    innesto di ostriche per la produzione di perle). Le attività  di servizi inerenti
    alla pesca marina o in acqua dolce o all''acquacoltura sono incluse nelle relative
    attività  di pesca o acquacoltura.

    Questa divisione non include la costruzione e la riparazione di navi ed imbarcazioni
    (30.1, 33.15) e le attività  di pesca sportiva o praticata per divertimento (93.19).
    La lavorazione del pesce, dei crostacei o dei molluschi à¨ esclusa, sia in caso
    di lavorazione prevalentemente in strutture a terra che su navi attrezzate esclusivamente
    a tale scopo (10.20). Questa divisione include l’acquaponica, un sistema produttivo
    che prevede la produzione combinata di prodotti agricoli e prodotti della pesca:
    le attività che utilizzano tale tecnica sono classificate nella divisione 01
    solo se le coltivazioni agricole rappresentano il principale output dell’attività,
    altrimenti sono classificate nel gruppo 03.2.'
  id: '03'
  label_it: PESCA E ACQUACOLTURA
  parent:
