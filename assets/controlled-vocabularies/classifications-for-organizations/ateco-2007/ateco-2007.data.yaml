  definition: Questa divisione include la produzione di petrolio greggio, l'estrazione
    di oli da scisti bituminosi e sabbie petrolifere, la produzione di gas naturale
    nonchà© il recupero di idrocarburi liquidi. Comprende anche le attività  di gestione
    e/o sviluppo dei siti che contengono oli e gas naturali. Tali attività  possono
    includere la trivellazione, il completamento e l'allestimento dei pozzi; l'uso
    di separatori, di attrezzature per la rottura dell'emulsione, di apparecchiature
    per la fangatura e di linee di raccolta per il petrolio greggio; sono incluse
    anche tutte le altre attività  legate alla preparazione del petrolio e del gas
    dal sito di produzione al punto di spedizione.
