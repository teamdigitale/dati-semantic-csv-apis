  definition: 'Questa classe include la prestazione di servizi di consulenza, orientamento
    ed assistenza operativa ad imprese ed altre organizzazioni in materia gestionale
    e, in particolare, in materia di: pianificazione strategica ed organizzativa;
    reingegnerizzazione (re-engineering) dei processi aziendali; gestione del cambiamento
    (change management), contenimento dei costi aziendali ed altre analisi finanziarie;
    obiettivi e politiche di marketing; politiche, strategie e pratiche di gestione
    delle risorse umane; strategie di indennità  e pensionamento; programmazione della
    produzione e pianificazione e controllo della gestione aziendale.'
