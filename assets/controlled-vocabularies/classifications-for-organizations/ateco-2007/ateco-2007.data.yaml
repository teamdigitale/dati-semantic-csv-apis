  definition: Questa divisione include la preparazione e la tintura di pellicce, la
    trasformazione delle pelli in cuoio tramite trattamento o conciatura e la fabbricazione
    in cuoio di articoli destinati al consumo finale. La divisione include anche la
    fabbricazione di prodotti simili ottenuti con altri materiali (imitazione di pelliccia
    o similpelle), come scarpe in gomma, valigie in fibra tessile eccetera. I prodotti
    ottenuti utilizzando il similpelle sono inclusi in questa divisione, in quanto
    sono lavorati in modo simile a quelli lavorati in pelle (ad esempio valigie) e
    spesso sono prodotti nella stessa unità .
