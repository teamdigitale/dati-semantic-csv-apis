  definition: Questa divisione include le attività  di cura e controllo della salute
    del bestiame o degli animali da compagnia. Tali attività  sono svolte da veterinari
    in cliniche veterinarie o presso fattorie, canili o ricoveri per animali, ambulatori
    veterinari, o altro. Sono inclusi anche i servizi di ambulanza per animali.
