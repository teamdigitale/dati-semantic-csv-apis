  definition: 'Questa divisione include le attività  dei servizi di ristorazione che
    forniscono pasti completi o bevande per il consumo immediato, sia in ristoranti
    tradizionali, self-service o da asporto, che in chioschi permanenti o temporanei
    con o senza posti a sedere. L''aspetto decisivo à¨ che vengono forniti pasti per
    il consumo immediato, indipendentemente dal tipo di struttura che li offre.

    àˆ esclusa la fornitura di pasti non preparati per il consumo immediato o che
    non siano prodotti per essere consumati immediatamente o di cibo preparato che
    non puà² essere considerato un pasto (cfr. divisioni 10: Industrie alimentari
    e 11: Industria delle bevande). àˆ inoltre esclusa la vendita di alimenti non
    prodotti in proprio che non possono essere considerati un pasto o di pasti non
    pronti per il consumo immediato (cfr. sezione G: commercio all''ingrosso e al
    dettaglio e riparazione di autoveicoli).'
