  definition: 'Questa classe include diverse attività  di servizi rivolte principalmente
    a clienti commerciali. Sono incluse attività  per le quali sono richiesti elevati
    livelli di preparazione professionale, scientifica e tecnica.

    Da questa classe sono escluse le attività  svolte da parte degli studi di architettura
    e di ingegneria, dei commercialisti, avvocati, notai eccetera, consulenza gestionale
    eccetera.'
