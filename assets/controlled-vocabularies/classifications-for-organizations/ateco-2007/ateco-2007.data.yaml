  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include le attività  di fornitura dei servizi di telecomunicazione
    e le attività  ad essa associate, ossia la trasmissione di voce, dati, testi,
    suoni e video. Le strutture di trasmissione che effettuano tali attività  possono
    utilizzare una tecnologia singola o un insieme di tecnologie. L''insieme delle
    attività  classificate in questa divisione riguardano la trasmissione di contenuti,
    ma non la creazione degli stessi. La classificazione di questa divisione viene
    effettuata in base al tipo di infrastruttura gestita.

    Nel caso di trasmissione di segnale televisivo, questa puà² includere l''unificazione
    dei palinsesti (prodotti nella divisione 60) in pacchetti di programmazione pronti
    per la distribuzione.'
