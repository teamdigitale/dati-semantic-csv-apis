  - covapit:PrivateOrgActivityType
  definition: 'Nelle attività  di vendita al dettaglio appartenenti a questa classe,
    gli articoli da acquistare vengono scelti sulla base di materiale pubblicitario,
    cataloghi, informazioni disponibili su siti internet o altri mezzi d''informazione.
    Le merci vengono ordinate per corrispondenza, per telefono o su internet (generalmente
    tramite modalità  specifiche di cui à¨ riportata indicazione sui diversi siti
    web). A seconda delle loro caratteristiche, i prodotti acquistati possono essere
    scaricati direttamente dalla rete internet o recapitati fisicamente al cliente.

    La fornitura di servizi via internet deve essere classificata nelle rispettive
    classi di appartenenza.'
