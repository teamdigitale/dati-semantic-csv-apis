  definition: Questo gruppo include "l'acquacoltura" (o aquafarming), ossia il processo
    di produzione che prevede la coltivazione o l'allevamento (inclusa la raccolta)
    di organismi acquatici (pesci, molluschi, crostacei, piante, coccodrilli, alligatori
    e anfibi) utilizzando tecniche progettate per aumentare la produzione di tali
    organismi, oltre la capacità  naturale dell'ambiente (per esempio, nutrimento
    regolare e difesa dai predatori).
