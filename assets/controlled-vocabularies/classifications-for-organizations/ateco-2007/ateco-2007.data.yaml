  definition: 'Questa classe comprende l''attività  di produzione di vari servizi
    di sussistenza da parte di famiglie e convivenze. Tra queste sono incluse la preparazione
    di pasti, l''insegnamento, l''assistenza ai parenti ed altri servizi prodotti
    dalle famiglie per la propria sussistenza.

    Se la famiglia à¨ anche impegnata nella produzione di molteplici beni per la sussistenza,
    questa à¨ classificata nelle attività  di produzione di beni non differenziati
    per la propria sussistenza.'
