  definition: 'Questa classe include la riparazione e la manutenzione di macchine
    ed apparecchiature industriali come l''affilatura e la sostituzione di lame e
    seghe su macchinari industriali, oppure servizi di riparazione tramite saldatura;
    la riparazione di macchine agricole ed altri macchinari ed apparecchiature industriali
    pesanti (ad esempio: carrelli elevatori ed altri apparecchi di movimentazione
    di materiali, macchine utensili, impianti di refrigerazione commerciale, macchine
    per l''edilizia e per miniere), cfr. divisione 28. Dalla classe à¨ esclusa la
    manutenzione e riparazione di autoveicoli, cfr. divisione 45.'
  id: '33.12'
