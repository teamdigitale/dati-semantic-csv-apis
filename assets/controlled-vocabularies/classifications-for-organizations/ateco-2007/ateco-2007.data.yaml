- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include la trasformazione di prodotti dell''agricoltura,
    della silvicoltura e della pesca in alimenti e bevande commestibili per l''uomo
    o per gli animali, nonchà© la produzione di vari prodotti intermedi da non considerare
    alla stregua dei prodotti alimentari (ad esempio, pellame proveniente dai macelli,
    panelli provenienti dalla produzione di olio).

    Questa divisione à¨ organizzata per attività  riguardanti diversi tipi di prodotti:
    carne, pesce, frutta e ortaggi, grassi ed oli, prodotti lattiero-caseari, granaglie,
    prodotti di panetteria e farinacei, altri prodotti alimentari e mangimi per animali.
    La produzione puà² essere effettuata per conto proprio o per conto terzi, come
    nel caso della macellazione su ordinazione.

    Questa divisione non include la preparazione di pasti per il consumo immediato
    come nei ristoranti.

    Alcune attività  sono considerate manifatturiere (panetterie che vendono i propri
    prodotti) anche se l''unità  che le espleta vende al dettaglio in un proprio negozio.
    Tuttavia, nel caso in cui la lavorazione sia minima e non conduca ad una reale
    trasformazione, l''unità  viene classificata nella sezione Commercio all''ingrosso
    e al dettaglio (sezione G).

    La preparazione di alimenti per il consumo immediato sul posto à¨ classificata
    nella divisione 56 (Attività  di ristorazione).

    Il trattamento di scarti della macellazione per la produzione di alimenti per
    animali à¨ classificato nel gruppo 10.9 relativo ai prodotti per l''alimentazione
    degli animali, mentre la trasformazione di cascami di alimenti e bevande in materie
    prime secondarie à¨ classificata nel gruppo 38.3 (Recupero dei materiali) e lo
    smaltimento di cascami di alimenti e bevande à¨ inserito nella classe 38.21 (Trattamento
    e smaltimento di rifiuti non pericolosi).'
