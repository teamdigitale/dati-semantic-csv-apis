  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include la riparazione da parte di unità  di beni
    prodotti dal settore manifatturiero, con l''obiettivo di ripristinare le funzionalità 
    di macchine, apparecchiature ed altri prodotti.

    Questa divisione include l''erogazione di servizi di manutenzione generale o ordinaria
    (inclusi i servizi di assistenza) destinata a tali prodotti, mirata a garantirne
    l''efficienza lavorativa e a prevenirne i guasti o le riparazioni non necessarie.

    Questa divisione include solo le attività  di riparazione e manutenzione da parte
    di unità  specializzate. Buona parte delle attività  di riparazione sono svolte
    anche dalle imprese che producono macchine, apparecchiature e altri beni; in questo
    caso la classificazione delle unità  impegnate in tali attività  di riparazione
    e produzione à¨ fatta secondo il principio del valore aggiunto.

    Dalla divisione à¨ esclusa la ricostruzione di macchine ed apparecchiature.

    Dalla divisione sono escluse anche la riparazione e la manutenzione di computer
    ed apparecchiature per le comunicazioni, di beni per uso personale e per la casa
    e di mobili per ufficio.

    In questa divisione à¨ anche inclusa l''installazione da parte di unità  specializzate
    di macchine. Tuttavia, l''installazione di apparecchiature che fanno parte integrante
    di edifici o strutture simili, come l''installazione di impianti elettrici, impianti
    idraulici (gas, acqua e sistemi di fognatura), impianti di condizionamento dell''aria,
    ascensori viene classificata nelle costruzioni (cfr. sez. F).'
  id: '33'
  label_it: RIPARAZIONE, MANUTENZIONE ED INSTALLAZIONE DI MACCHINE ED APPARECCHIATURE
