  definition: Questa divisione include l'erogazione di servizi residenziali di assistenza
    sanitaria associata a servizi infermieristici, di supervisione o di altro tipo,
    secondo le necessità  dei residenti. Le strutture ricoprono un ruolo significativo
    nel processo di produzione e l'assistenza erogata consiste in un insieme di servizi
    sociali e sanitari, di cui questi ultimi si configurano quasi esclusivamente come
    servizi infermieristici.
