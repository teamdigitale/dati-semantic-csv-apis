  definition: 'Questo gruppo include la produzione di gas e la distribuzione di gas
    naturale o sintetico agli utenti finali mediante un sistema di condotte. Sono
    inclusi in questo gruppo gli agenti o gli intermediari che organizzano la vendita
    di gas naturale all''interno di sistemi di distribuzione gestiti da terzi.

    Dal gruppo à¨ esclusa la gestione separata di gasdotti, che coprono generalmente
    lunghe distanze e che collegano le aziende produttrici ai distributori di gas
    o ai centri urbani ed à¨ classificata insieme ad altre attività  di trasporto
    realizzate mediante condotte o tubazioni (cfr. 49.50).'
