  definition: 'Questa divisione include le attività  di selezione di personale non
    dipendente dall''agenzia di collocamento, attività  di fornitura di personale
    da impiegare temporaneamente presso altre imprese a supporto della forza lavoro
    vigente in queste ultime, nonchà© le attività  di fornitura di altre risorse umane
