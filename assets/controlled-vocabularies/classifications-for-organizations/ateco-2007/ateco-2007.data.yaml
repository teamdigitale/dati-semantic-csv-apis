  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include la rivendita (vendita senza trasformazione)
    di beni nuovi e usati destinati principalmente ad uso e consumo personale o domestico
    in negozi, grandi magazzini, mercati e banchi, attraverso imprese di vendita per
    corrispondenza, mediante venditori porta a porta, venditori ambulanti, cooperative
    di consumo, via internet eccetera.

    Il commercio al dettaglio à¨ classificato in primo luogo in base al tipo di esercizio
    nel quale viene effettata la vendita, ovvero in commercio al dettaglio in negozi
    (gruppi da 47.1 a 47.7); commercio al dettaglio al di fuori dei negozi (gruppi
    47.8 e 47.9). Il commercio al dettaglio in negozi include la vendita al dettaglio
    di beni usati (classe 47.79). Per il commercio al dettaglio in negozi esiste un''ulteriore
    distinzione tra commercio al dettaglio specializzato (gruppi da 47.2 a 47.7) e
    non specializzato (gruppo 47.1). Questi gruppi sono ulteriormente suddivisi sulla
    base di criteri che tengono conto del tipo di prodotti venduti. Le vendite al
    di fuori dei negozi sono classificate in base alle forme di commercializzazione,
    come ad esempio il commercio ambulante, realizzato in mercati e banchi (gruppo
    47.8), oppure altri tipi di vendita al di fuori dei negozi, ovvero per corrispondenza,
    vendita porta a porta, attraverso distributori automatici, via internet eccetera
    (gruppo 47.9).

    Le merci relative alle attività  di vendita classificate in questa divisione rientrano
    prevalentemente nei beni destinati al consumo finale; pertanto sono esclusi i
    prodotti che non rientrano normalmente nel commercio al dettaglio, come ad esempio
    cereali in grani, minerali, macchine e impianti industriali eccetera.

    In questa divisione sono incluse anche le attività  di imprese che vendono, previa
    esposizione, beni quali personal computer, articoli di cancelleria, vernici o
    legname da costruzione, sebbene tali prodotti possano non essere destinati ad
    un uso personale o domestico. Il trattamento che di solito viene effettuato nel
    commercio non modifica le caratteristiche di base delle merci e puà² includere,
    ad esempio, la selezione, la separazione, la miscelatura e il confezionamento
    delle merci.

    Questa divisione include anche il commercio al dettaglio tramite incaricati alla
    vendita e case d''asta.'
  id: '47'
