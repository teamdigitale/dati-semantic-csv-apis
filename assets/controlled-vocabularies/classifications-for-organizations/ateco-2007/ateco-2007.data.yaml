  definition: 'Questa divisione include il noleggio e il leasing operativo di beni
    immateriali non finanziari e una vasta gamma di beni materiali quali automobili,
    computer, beni di consumo, macchine ed apparecchiature industriali. La sezione
    à¨ suddivisa in: (1) noleggio di autoveicoli, (2) noleggio di attrezzature sportive
    e ricreative e noleggio di attrezzature per uso personale e domestico, (3) leasing
    di altre macchine ed attrezzature generalmente impiegate in attività  commerciali,
    incluso altri mezzi di trasporto, (4) leasing di proprietà  intellettuali e di
    prodotti simili.

    La divisione prevede esclusivamente attività  di leasing operativo.'
  id: '77'
  label_it: ATTIVITÀ DI NOLEGGIO E LEASING OPERATIVO
