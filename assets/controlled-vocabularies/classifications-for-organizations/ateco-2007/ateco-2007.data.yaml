  definition: 'Questo gruppo include le visite mediche ed i trattamenti effettuati
    da medici generici, specialisti, inclusi chirurghi, dentisti eccetera.

    Le attività  previste in questo gruppo possono essere svolte in studi privati,
    in ambulatori in cui operano gruppi di medici ed in cliniche ospedaliere che svolgono
    servizio ambulatoriale presso aziende, scuole, case di riposo, organizzazioni
    sindacali, nonchà© a domicilio degli ammalati.

    Questo gruppo include anche:

    -   servizi di consulto privato a pazienti ricoverati'
