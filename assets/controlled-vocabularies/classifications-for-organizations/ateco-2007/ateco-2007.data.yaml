  definition: 'Questa divisione include l''edizione di libri, opuscoli, volantini,
    dizionari, enciclopedie, atlanti, cartine e mappe; l''edizione di giornali, riviste
    e periodici; elenchi, mailing list ed altre pubblicazioni, anche di software.

    Le attività  legate all''editoria includono l''acquisizione dei diritti d''autore
    di contenuti (prodotti di informazione) e l''erogazione di tali prodotti al pubblico
    attivando (o prendendo accordi per) la riproduzione e la distribuzione degli stessi
    in varie forme. Tutte le possibili forme di editoria (in forma cartacea, elettronica
    o audio, su internet, su supporto multimediale, ad esempio testi su Cd-Rom eccetera)
    esclusa l''edizione di pellicole cinematografiche, sono incluse in questa divisione.

    Questa divisione esclude l''edizione di pellicole cinematografiche, videocassette
    e film su Dvd o su supporto simile (divisione 59) e la produzione di copie originali
    per dischi o materiale audio (divisione 59). Sono escluse inoltre la stampa (cfr.
    18.11, 18.12) e la riproduzione di supporti registrati (cfr. 18.20).'
  id: '58'
