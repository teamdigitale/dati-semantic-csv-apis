  definition: Questa classe include i centri e le scuole che offrono corsi di preparazione
    per l'attività  sportiva, a gruppi o singoli individui. Sono inclusi anche i centri
    che offrono corsi sportivi serali o diurni. Non sono incluse accademie ed università .
    I corsi possono avere luogo in contesti diversi, quali le strutture dell'unità 
    o del cliente, le istituzioni scolastiche o tramite altri mezzi. Le attività 
    comprese in questa classe sono organizzate in modo strutturato.
