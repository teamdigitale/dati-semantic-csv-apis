  definition: 'Questa classe include la fornitura di alloggi a visitatori, generalmente
    su base giornaliera o settimanale, per soggiorni di breve durata. Le strutture
    qui classificate forniscono alloggi ammobiliati come camere e suite, talvolta
    con cucinini. Le unità  qui classificate forniscono servizi quotidiani di pulizia
    e rifacimento letti ed offrono una gamma di servizi aggiuntivi quali: ristorazione,
    parcheggio, lavanderia, piscine e palestre, strutture ricreative e sale per conferenze
    e convegni.'
