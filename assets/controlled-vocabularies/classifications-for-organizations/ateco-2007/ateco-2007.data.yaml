  definition: Questa classe include l'erogazione di servizi residenziali e di assistenza
    non medica per anziani e disabili non autosufficienti e/o che non desiderano vivere
    da soli. I servizi, generalmente, includono vitto e alloggio, supervisione e assistenza
    nella vita quotidiana, ad esempio per i lavori domestici. In alcuni casi, queste
    unità  forniscono assistenza infermieristica specialistica in strutture separate.
