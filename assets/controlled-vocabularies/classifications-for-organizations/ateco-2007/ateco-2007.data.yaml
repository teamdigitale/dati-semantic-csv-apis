  definition: 'Questa divisione include le attività  di stampa di quotidiani, libri,
    periodici, moduli commerciali, biglietti d''auguri e altro materiale; sono comprese
    anche le attività  di supporto, quali la legatoria, la preparazione di lastre
    e l''elaborazione elettronica di testi e immagini. Le attività  di supporto che
    rientrano in questa divisione costituiscono parte integrante dell''industria grafica
    in quanto il risultato di tali operazioni à¨ un prodotto (lastre da stampa, libri
    rilegati, dischi o file per computer) che costituisce parte integrante dell''industria
    grafica.

    I processi utilizzati nella stampa comprendono vari metodi per trasferire un''immagine
    da una lastra, da uno schermo o da un supporto informatico ad un supporto di carta,
    plastica, metallo, tessuto o legno. Il metodo pià¹ importante consiste nel trasferire
    l''immagine da una lastra o uno schermo al supporto mediante un procedimento di
    stampa offset, rotocalcografia, serigrafia, flessografia. Spesso il supporto informatico
    viene utilizzato per creare un testo o un''immagine che vengono stampati mediante
    sistemi di stampa elettronici (stampanti laser o inkjet).

    Questa divisione include anche la riproduzione di supporti di registrazione come
    compact disc, registrazioni video, software su disco o nastro, dischi eccetera.'
  id: '18'
  label_it: STAMPA E RIPRODUZIONE DI SUPPORTI REGISTRATI
