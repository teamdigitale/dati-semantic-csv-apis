  definition: 'Nella divisione sono incluse tutte le attività  (esclusa fabbricazione
    e noleggio) connesse al commercio, manutenzione e riparazione di motocicli e autoveicoli,
    inclusi autocarri e camion: commercio all''ingrosso e al dettaglio di veicoli
    nuovi e di seconda mano, inclusa la manutenzione e la riparazione, il commercio
    all''ingrosso e al dettaglio di parti ed accessori. Sono anche incluse le attività 
    dei concessionari di vendita all''ingrosso o al dettaglio di veicoli, le vendite
    all''asta e tramite internet.

    La divisione include anche le attività  di lavaggio, lucidatura dei veicoli eccetera.

    La divisione non include la vendita al dettaglio di carburante e prodotti lubrificanti
    o refrigeranti, o il noleggio di automobili o motocicli.'
