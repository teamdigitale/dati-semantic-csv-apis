- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include tre attività : 1) ricerca di base: lavoro
    sperimentale o teorico svolto principalmente per acquisire nuove conoscenze sui
    fondamenti dei fenomeni e dei fatti osservabili, non finalizzato ad una specifica
    applicazione o utilizzazione, 2) ricerca applicata: lavoro originale svolto per
    acquisire nuove conoscenze e finalizzato principalmente ad una pratica e specifica
    applicazione, 3) sviluppo sperimentale: lavoro sistematico, basato sulle conoscenze
    esistenti acquisite attraverso la ricerca e/o l''esperienza pratica, condotto
    al fine di produrre, sviluppare nuovi materiali, prodotti e apparecchi, di installare
    nuovi processi, sistemi e servizi e di migliorare sostanzialmente quelli già 
    prodotti o installati.

    Le attività  di ricerca e sviluppo sperimentale, incluse in questa divisione,
    sono suddivise in due ulteriori categorie: scienze naturali e ingegneria; scienze
    sociali e umanistiche.'
  id: '72'
  label_it: RICERCA SCIENTIFICA E SVILUPPO
  parent:
