  definition: 'Questa classe comprende le attività  di produzione delle famiglie e
    convivenze di beni indifferenziati di sussistenza, ossia le attività  delle famiglie
    che sono impegnate in produzioni di beni vari destinati al consumo proprio. Queste
    attività  possono essere la caccia e la raccolta, l''allevamento, la costruzione
    di rifugi, l''abbigliamento e altri beni prodotti dalle famiglie per la loro sussistenza.

    Se le famiglie sono impegnate nella produzione di beni commerciali, tale attività 
    deve essere classificata nella corrispondente attività  economica secondo la classificazione
    Nace. Se esse sono principalmente impegnate in una specifica attività  di produzione
    di beni di sussistenza, vengono classificate all''interno della corrispondente
    attività  economica seguendo la classificazione Nace.'
  id: '98.10'
  label_it: Produzione di beni indifferenziati per uso proprio da parte di famiglie
    e convivenze
