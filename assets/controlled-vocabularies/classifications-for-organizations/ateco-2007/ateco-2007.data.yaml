- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: Nella divisione sono comprese le attività  di fusione e/o affinazione
    di metalli ferrosi e non ferrosi a partire da minerali, lingotti metallici o rottame
    metallico, con tecniche elettrometallurgiche ed altre tecniche metallurgiche.
    Rientra in questa divisione anche la produzione di leghe e superleghe di metalli,
    con l'aggiunta nei metalli puri di altri elementi chimici. I prodotti ottenuti
    dalla fusione e dalla affinazione, generalmente in forma di lingotti vengono trasformati
    con processo di laminazione, trafilatura ed estrusione in lamiere, nastri, barre,
    tondi o vergella e in forma fusa, per realizzare pezzi di fonderia e altri prodotti
    metallici.
