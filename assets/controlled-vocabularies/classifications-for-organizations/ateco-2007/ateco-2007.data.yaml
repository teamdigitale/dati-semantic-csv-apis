  definition: Questa divisione include le attività  di biblioteche ed archivi; la
    gestione di musei di ogni tipo, degli orti botanici e dei giardini zoologici;
    la gestione dei siti storici e le attività  delle riserve naturali. Sono anche
    incluse la conservazione e l'esposizione di oggetti, siti e meraviglie naturali
    di interesse storico, culturale o educativo (ad esempio luoghi considerati patrimonio
    dell'umanità  eccetera).
  id: '91'
