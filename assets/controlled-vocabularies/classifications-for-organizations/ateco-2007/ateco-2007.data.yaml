  definition: Questo gruppo include la riparazione e la manutenzione da parte di unità 
    specializzate di beni prodotti dal settore manifatturiero, con l'obiettivo di
    ripristinare le funzionalità  di macchine, apparecchiature ed altri prodotti.
    Il gruppo include l'erogazione di servizi di manutenzione generale o ordinaria
    (inclusi i servizi di assistenza) destinata a tali prodotti, mirata a garantirne
    l'efficienza lavorativa e a prevenirne i guasti o le riparazioni non necessarie.
  id: '33.1'
