  definition: 'Questa classe include attività  di fornitura e gestione per il cliente
    di risorse umane. Le unità  qui classificate rappresentano il datore di lavoro
    in attività  relative alla gestione di: buste paga, tasse ed altre questioni fiscali
    e attinenti alla gestione delle risorse umane, ma non sono responsabili della
    direzione e della supervisione del lavoro del personale occupato.

