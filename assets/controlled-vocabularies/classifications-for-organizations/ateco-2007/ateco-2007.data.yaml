  definition: Questo gruppo include lo smaltimento e il trattamento che precede lo
    smaltimento di varie forme di rifiuti tramite differenti modalità , come il trattamento
    di rifiuti organici a scopo di smaltimento; il trattamento e lo smaltimento di
    animali infettivi, vivi o morti, e di altri rifiuti contaminati; il trattamento
    e lo smaltimento di residui radioattivi di transizione provenienti da ospedali
    eccetera; il conferimento a discariche o in acqua; l'interramento dei rifiuti;
    lo smaltimento di beni usati quali frigoriferi, per smaltire i rifiuti tossici;
    lo smaltimento dei rifiuti tramite incenerimento o combustione.
