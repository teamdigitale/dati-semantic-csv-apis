  definition: 'Questa classe include la fornitura di servizi di ristorazione a clienti,
    con servizio al tavolo o self-service, sia che consumino il pasto in loco, sia
    che lo portino via o se lo facciano consegnare a domicilio. àˆ inclusa la preparazione
    di pasti per il consumo immediato, sia in furgoni attrezzati per la ristorazione
    ambulante, sia presso banchi del mercato.

    àˆ inclusa l''eventuale attività  di intrattenimento e spettacolo.'
