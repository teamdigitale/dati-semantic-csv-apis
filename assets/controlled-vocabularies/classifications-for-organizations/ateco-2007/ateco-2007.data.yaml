  definition: Questa divisione include l'estrazione di minerali metalliferi, effettuata
    in sotterraneo o a cielo aperto, estrazioni marine eccetera. Sono comprese anche
    le operazioni di arricchimento dei minerali quali la frantumazione, la macinazione,
    il lavaggio, l'essiccazione, la sinterizzazione, la calcinazione o la lisciviazione,
    la separazione gravimetrica o le operazioni di flottazione.
