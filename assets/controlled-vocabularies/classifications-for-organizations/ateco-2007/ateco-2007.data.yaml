  definition: 'Questa divisione include le seguenti attività , mirate a fornire servizi
    specifici nel settore delle tecnologie informatiche: scrittura, modifica, verifica
    e assistenza software; pianificazione e progettazione di sistemi informatici che
    integrano hardware, software e tecnologie delle comunicazioni; gestione ed utilizzo
    on-site dei sistemi informatici dei clienti e/o di strutture di elaborazione dei
    dati ed infine altre attività  professionali e tecniche legate al settore informatico.'
