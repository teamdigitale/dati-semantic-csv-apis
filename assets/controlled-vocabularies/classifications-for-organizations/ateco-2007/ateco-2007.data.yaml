  definition: 'Questa classe include la fabbricazione e/o l''assemblaggio di computer,
    quali elaboratori centrali, computer da scrivania, portatili e server; nonchà©
    periferiche per computer, quali unità  per dischi fissi ed apparecchi di input/output
    (stampanti, monitor, tastiere). I computer possono essere analogici, digitali,
    o ibridi. I computer digitali, che sono pià¹ comuni, sono apparecchiature che
    effettuano le seguenti operazioni: (1) memorizzare i programmi e i dati immediatamente
    necessari all''esecuzione degli stessi; (2) essere liberamente programmati, a
    seconda dei bisogni dell''utente; (3) effettuare operazioni aritmetiche specificamente
    richieste dall''utente; (4) eseguire, senza l''intervento umano, programmi che
    modificano l''operatività  durante l''esecuzione secondo criteri e decisioni logiche.
    I computer analogici sono in grado di simulare modelli matematici e contengono
    almeno elementi di controllo e programmazione analogica.'
  id: '26.20'
  label_it: Fabbricazione di computer e unità  periferiche
