- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: Questo gruppo include "la cattura di fauna marina", ossia le attività 
    di caccia, rimozione e cattura di organismi acquatici viventi (generalmente pesci,
    molluschi e crostacei), incluse le alghe provenienti da acque oceaniche, costiere
    o interne, destinate al consumo da parte dell'uomo e ad altri scopi, effettuate
    a mano o pià¹ generalmente tramite attrezzature da pesca come reti e trappole
    in linea o stazionarie. Tali attività  possono essere condotte sulla linea costiera
    litorale (per esempio, la raccolta di molluschi come cozze ed ostriche), tramite
    cattura con reti a terra, utilizzando imbarcazioni in acque interne, costiere
    o in mare aperto. Tali attività  includono anche la pesca professionale in specchi
    d'acqua ripopolati.
  id: '03.1'
