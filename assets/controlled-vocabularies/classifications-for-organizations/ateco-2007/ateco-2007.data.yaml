  definition: Questa divisione include le attività  a breve o lungo termine di ospedali,
    generici o specialistici, chirurgici, psichiatrici, centri di disintossicazione,
    sanatori, preventori, centri di riabilitazione, lebbrosari ed altre istituzioni
    sanitarie residenziali che forniscono trattamenti diagnostici e terapeutici di
    vario tipo ai pazienti ricoverati. Sono incluse anche le visite mediche ed i trattamenti
    nel settore della medicina generale e specialistica effettuati da medici generici,
    medici specialisti e chirurghi. Sono incluse le attività  di assistenza odontoiatrica,
    generica o specialistica e le attività  di ortodonzia. Inoltre, questa divisione
    include le attività  di assistenza sanitaria non effettuate da ospedali o da medici,
    bensà¬ da paramedici professionisti legalmente abilitati al trattamento dei pazienti.
  id: '86'
  label_it: ASSISTENZA SANITARIA
