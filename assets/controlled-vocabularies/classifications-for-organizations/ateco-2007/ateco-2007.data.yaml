  definition: 'Questa classe comprende un tipo di istruzione che pone le basi dell''apprendimento
    e dello sviluppo umano e che à¨ in grado di favorire nuove opportunità  di istruzione
    futura.

    A questo livello, l''approfondimento degli argomenti inizia ad avere una certa
    influenza sull''esperienza formativa dello studente. I programmi sono progettati
    in modo da qualificare gli studenti per l''accesso ad un''istruzione sia tecnica,
    sia professionale, o per l''accesso a livelli superiore di istruzione che non
    richiedono una preparazione specifica.'
