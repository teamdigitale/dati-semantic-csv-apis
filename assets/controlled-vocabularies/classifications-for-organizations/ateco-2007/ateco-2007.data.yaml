  definition: 'Questa divisione include le attività  di creazione di contenuti e di
    acquisizione dei diritti di distribuzione degli stessi, con successiva trasmissione
    in programmi radiofonici e televisivi di intrattenimento, telegiornali, talk-show
    e simili. àˆ inclusa anche la trasmissione di testi, principalmente collegata
    alle trasmissioni radiotelevisive. La trasmissione puà² avvenire tramite l''impiego
    di diverse tecnologie, via ripetitore, via satellite, via cavo o via internet.
    La divisione comprende anche la produzione di programmi destinati per loro natura
    ad un pubblico ristretto (ad esempio notiziari, programmi sportivi, educativi,
    programmi destinati ad un pubblico giovane) disponibili tramite abbonamento o
    a pagamento a terzi, per successiva trasmissione al pubblico.

    Questa divisione esclude la diffusione di programmi televisivi completi da parte
    di terzi, ossia senza alterazione del contenuto, (cfr. divisione 61).'
  id: '60'
