  definition: 'Questa divisione include le attività  di famiglie e convivenze di produzione
    di beni di sussistenza e di servizi.

    Sono incluse unicamente le attività  di famiglie e convivenze per le quali à¨
    impossibile identificare un''attività  principale fra le attività  di sussistenza
    della famiglia. Se la famiglia à¨ impegnata in un''attività  produttiva di mercato,
    la sua produzione deve essere classificata in base all''attività  di mercato principale
    da essa svolta.'
  id: '98'
