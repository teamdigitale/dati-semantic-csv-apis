  definition: Questo gruppo include la gestione di impianti sportivi; la gestione
    di squadre o club sportivi mirata principalmente alla partecipazione ad eventi
    che si svolgono di fronte ad un pubblico pagante; atleti indipendenti ingaggiati
    per partecipare ad eventi sportivi o gare dal vivo con spettatori paganti; proprietari
    di mezzi utilizzati nelle gare, quali automobili, cani, cavalli eccetera principalmente
    impegnati nella partecipazione a gare o ad altri eventi sportivi con spettatori;
    allenatori che forniscono servizi specialistici di supporto a chi partecipa ad
    eventi sportivi o gare; gestori di palazzetti dello sport e stadi; altre attività 
    di organizzazione, promozione o gestione di eventi sportivi n.c.a..
