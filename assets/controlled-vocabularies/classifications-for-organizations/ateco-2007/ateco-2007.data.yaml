  definition: 'Questa divisione include la produzione di spettacoli cinematografici
    su pellicola, videocassetta o disco per la proiezione diretta in sale cinematografiche
    o per la trasmissione in televisione; le attività  ausiliarie quali l''editing,
    il montaggio, il doppiaggio eccetera; la distribuzione ad altre industrie di spettacoli
    cinematografici e di altre produzioni; la proiezione di spettacoli cinematografici
    e di altre produzioni. Sono inclusi in questa divisione l''acquisto e la vendita
    di spettacoli cinematografici, di altre produzioni e dei diritti di distribuzione.

    La divisione comprende anche le attività  degli studi di registrazione sonora,
    ossia la produzione di registrazioni sonore originali, il lancio, la promozione
    e la distribuzione del materiale registrato, l''edizione di musica e le attività 
    di registrazione sonora effettuata negli studi o altrove.'
