  definition: 'Questa divisione include la fabbricazione di pasta-carta, carta e prodotti
    di carta trasformati. La fabbricazione di tali prodotti à¨ raggruppata insieme
    in quanto si tratta di una serie di processi integrati verticalmente. Una stessa
    unità  spesso effettua pià¹ di una attività .

    Le attività  sono essenzialmente tre: la fabbricazione di pasta-carta, che comporta
    la separazione delle fibre di cellulosa dalle altre impurità  del legno o della
    carta usata; la fabbricazione di carta, che comporta la finitura di tali fibre
    in fogli; la trasformazione e la lavorazione di prodotti di carta e cartone, fatte
    con tecniche e l''apporto di materiali diversi.

    La fabbricazione di articoli di carta stampata (ad esempio: carta da parati, carta
    da regalo eccetera) à¨ compresa in questa divisione a condizione che l''attività 
    di stampa non costituisca lo scopo principale.

    La produzione di pastacarta, carta e cartone in forma grezza à¨ inclusa nel gruppo
    17.1, mentre il gruppo 17.2 include la produzione di carta e prodotti in carta
    sottoposti a un''ulteriore lavorazione.'
  id: '17'
  label_it: FABBRICAZIONE DI CARTA E DI PRODOTTI DI CARTA
