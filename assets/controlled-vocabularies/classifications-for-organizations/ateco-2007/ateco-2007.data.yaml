  definition: Questo gruppo include le attività  di organizzazioni che promuovono
    gli interessi dei membri delle organizzazioni economiche e di datori di lavoro.
    Nel caso delle organizzazioni professionali, sono incluse anche le attività  di
    promozione degli interessi professionali dei membri.
