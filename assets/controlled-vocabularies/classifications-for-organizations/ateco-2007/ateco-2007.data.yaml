- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include la fornitura di servizi integrati di assistenza
    da effettuarsi presso le strutture del cliente.

    La divisione include anche la pulizia di interni ed esterni di edifici di tutti
    i tipi, la pulizia di macchinari industriali, di treni, autobus, aeromobili eccetera,
    pulizia interna delle cisterne per trasporti su strada o marittimi, attività 
    di disinfezione e di disinfestazione di edifici, navi, treni eccetera, pulizia
    di bottiglie, pulizia delle strade, rimozione di neve e ghiaccio, servizi di tutela
    del paesaggio, cura e manutenzione del paesaggio, incluse le eventuali realizzazioni
    e manutenzione delle opere connesse (vialetti, ponticelli, recinzioni, laghetti
    artificiali e strutture simili).'
