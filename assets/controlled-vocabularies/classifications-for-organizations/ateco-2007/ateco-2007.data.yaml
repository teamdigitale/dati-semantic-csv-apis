  definition: 'Questa divisione include la preparazione e la filatura di fibre tessili
    compresa la tessitura di materie tessili, il finissaggio dei tessili e degli articoli
    di vestiario, la fabbricazione di articoli in tessuto, diversi dagli articoli
    di vestiario (ad esempio: biancheria da casa, coperte, scendiletto, corde eccetera).
    La coltivazione di piante produttrici di fibre naturali rientra nella divisione
    01, mentre la fabbricazione di fibre artificiali e sintetiche à¨ un processo chimico
    che va classificato nella classe 20.60. La fabbricazione di articoli di vestiario
    rientra nella divisione 14.'
