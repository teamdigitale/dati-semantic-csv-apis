- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include le attività  di organizzazioni che promuovono
    idee all''attenzione pubblica. Usualmente queste organizzazioni sono formate da
    un gruppo di membri ma delle loro attività  possono beneficiare anche i non iscritti.
    La divisione à¨ ripartita in prima istanza in base allo scopo primario che le
    organizzazioni perseguono: l''interesse di datori di lavoro, di lavoratori autonomi
    e comunità  scientifiche (gruppo 94.1), gli interessi dei lavoratori dipendenti
    (gruppo 94.2) o la promozione di idee ed attività  religiose, politiche, culturali,
    scolastico-educative o ricreative (gruppo 94.9).'
  id: '94'
