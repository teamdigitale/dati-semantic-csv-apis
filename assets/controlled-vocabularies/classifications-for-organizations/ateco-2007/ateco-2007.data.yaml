  definition: 'Questa divisione include le attività  relative alla lavorazione di
    sostanze singole di origine minerale. La divisione include la fabbricazione di
    vetro e di prodotti in vetro (ad esempio: vetro piano, vetro cavo, fibre di vetro,
    vetro per usi tecnici eccetera), prodotti in ceramica, mattonelle e prodotti in
    terracotta, cemento e gesso, dai materiali grezzi fino agli articoli finiti. La
    fabbricazione di pietra lavorata e finita e di altri prodotti minerali à¨ inclusa
    in questa divisione.'
  id: '23'
