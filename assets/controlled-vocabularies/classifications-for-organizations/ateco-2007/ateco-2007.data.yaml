  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include tutti i tipi di sartoria (abiti confezionati
    o su misura), in qualsiasi materiale (ad esempio: pelle, tessuto, tessuti a maglia
    eccetera), tutti gli articoli di abbigliamento (ad esempio: indumenti esterni,
    biancheria per uomo, donna e bambino; indumenti da lavoro, abbigliamento da città 
    o casual eccetera) e gli accessori. Non viene fatta distinzione tra abbigliamento
    per adulti e per bambini, o tra abbigliamento moderno e classico. La divisione
    14 include anche il confezionamento di articoli in pelliccia. àˆ escluso il finissaggio
    degli articoli di abbigliamento (cfr. 13.30).'
  id: '14'
