  - covapit:PrivateOrgActivityType
  definition: Questa sezione include una vasta gamma di attività  destinate a soddisfare
    diversi interessi culturali, di intrattenimento e divertimento per il pubblico,
    inclusi spettacoli dal vivo, gestione di musei, giochi e scommesse, attività 
    sportive e ricreative.
  id: R
  label_it: ATTIVITÀ ARTISTICHE, SPORTIVE, DI INTRATTENIMENTO E DIVERTIMENTO
  parent: []
