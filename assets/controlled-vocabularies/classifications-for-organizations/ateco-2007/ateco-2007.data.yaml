  definition: 'Questa classe include la gestione da parte dell''amministrazione pubblica
    dei programmi mirati a migliorare il benessere individuale: sanità , istruzione,
    cultura, sport, attività  ricreative, ambiente, abitazioni, servizi sociali.

    Include anche l''amministrazione pubblica delle politiche di ricerca e sviluppo
    e dei fondi relativi a queste aree.'
  id: '84.12'
  label_it: Regolamentazione delle attività  relative alla fornitura di servizi di
