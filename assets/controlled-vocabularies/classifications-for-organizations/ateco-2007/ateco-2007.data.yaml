  definition: 'Questa divisione include i servizi di supporto specialistico alle attività 
    di estrazione per conto terzi.

    Include i servizi di esplorazione, effettuati tramite metodi tradizionali come
    la raccolta di campioni e le osservazioni geologiche, oltre alla trivellazione,
    ai test di trivellazione, alla ritrivellazione di pozzi petroliferi e di miniere
    di minerali metalliferi e non metalliferi. Altri servizi tipici riguardano la
    costruzione delle fondamenta per i pozzi petroliferi e di gas, l''intonaco delle
    pareti dei pozzi, il lavaggio, lo spurgo e la pulitura dei pozzi, il drenaggio
    e il pompaggio delle miniere, la rimozione delle macerie dalle miniere eccetera.'
