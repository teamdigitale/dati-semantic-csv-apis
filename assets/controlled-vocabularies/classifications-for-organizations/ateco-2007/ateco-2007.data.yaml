  definition: 'Questo gruppo include le attività  di supporto al trasporto di passeggeri
    o merci, quali la gestione di parti delle infrastrutture o delle attività  legate
    alla movimentazione delle merci, effettuate immediatamente prima o dopo un''operazione
    di trasporto, o durante le successive tappe del trasporto. àˆ inclusa l''attività 
    delle biglietterie diverse dalle agenzie di viaggio.

    àˆ escluso il servizio di radiocontrollo satellitare dei mezzi di trasporto, cfr.
    80.20'
