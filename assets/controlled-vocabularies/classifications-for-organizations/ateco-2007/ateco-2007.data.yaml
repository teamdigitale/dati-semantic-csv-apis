  definition: 'Questa divisione include la fabbricazione di macchinari ed apparecchiature
    comprese le rispettive parti meccaniche che intervengono meccanicamente o termicamente
    sui materiali o sui processi di lavorazione. Questa divisione include apparecchi
    fissi e mobili o portatili a prescindere dal fatto che siano stati progettati
    per uso industriale, per l''edilizia e l''ingegneria civile, per uso agricolo
    o domestico. Inoltre à¨ inclusa in questa divisione la fabbricazione di alcune
    apparecchiature speciali, per trasporto di passeggeri o merci entro strutture
    delimitate.

    Questa divisione opera una distinzione tra la fabbricazione di macchinari per
    usi speciali, ossia macchinari per uso esclusivo in una specifica attività  economica
    o in piccoli raggruppamenti di attività  economiche, e macchinari di impiego generale,
    ovvero macchinari utilizzabili in una vasta gamma di attività  economiche previste
    nella classificazione Nace.

    Questa divisione include anche la fabbricazione di macchinari per usi speciali,
    non presenti altrove in questa classificazione, utilizzati o meno in un processo
    di fabbricazione, come le apparecchiature utilizzate nei parchi di divertimento,
    nelle piste automatiche da bowling eccetera.

    àˆ esclusa la fabbricazione di prodotti in metallo per usi generali (divisione
    25), apparecchi di controllo associati, strumenti computerizzati, strumenti di
    misurazione, apparati di distribuzione e controllo dell''energia elettrica (divisioni
    26 e 27) e veicoli a motore per uso generico (divisioni 29 e 30).'
  id: '28'
