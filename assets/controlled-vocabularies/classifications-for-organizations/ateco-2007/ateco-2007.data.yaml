  definition: 'Questa classe include la fornitura di alloggi a visitatori, generalmente
    su base giornaliera o settimanale e principalmente per soggiorni di breve durata
    in spazi autonomi costituiti da stanze completamente ammobiliate o aree di soggiorno
    per la notte con angolo cottura o cucina arredata.

    Questi spazi possono consistere in appartamenti in piccoli edifici indipendenti
    a pià¹ piani o in gruppi di edifici, bungalow ad un solo piano, chalet, cottage
    e casette in villaggi turistici. I servizi accessori erogati, se presenti, sono
    minimi.'
