  definition: Questo gruppo include la coltivazione di colture non permanenti, ossia
    piante che non durano pià¹ di due stagioni agricole. àˆ inclusa la coltivazione
    di queste piante per la produzione di sementi.
  id: '01.1'
  label_it: COLTIVAZIONE DI COLTURE AGRICOLE NON PERMANENTI
