  definition: 'Questa divisione include la riparazione e la manutenzione di computer
    e periferiche, quali computer desktop, laptop (portatili), terminali, memorie
    di massa e stampanti. àˆ anche inclusa la riparazione di apparecchiature per le
    comunicazioni quali fax, walkie-talkie ed elettronica di consumo, ad esempio:
    radio e televisori, strumenti da giardinaggio come tosaerba e soffiatori per neve
    e foglie, calzature e articoli in pelle, mobili, accessori per capi di abbigliamento,
    articoli sportivi, strumenti musicali, articoli per hobby ed altri beni per uso
    personale e per la casa.'
