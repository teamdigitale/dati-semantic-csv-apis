  definition: 'Questa classe include l''amministrazione pubblica e la regolamentazione
    di vari settori economici, inclusa l''allocazione di sussidi: agricoltura, utilizzazione
    del suolo, risorse energetiche e minerarie, infrastrutture, trasporti, comunicazioni,
    alberghi e turismo, commercio all''ingrosso e al dettaglio

