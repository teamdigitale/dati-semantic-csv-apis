  definition: 'Questa classe include l''erogazione di corsi scolastici di primo livello
    ISCED e attività  connesse che forniscono agli studenti una solida istruzione
    di base, per cià² che concerne la lettura, la scrittura, la matematica e la comprensione
    a livello elementare di altre materie, quali storia, geografia, scienze naturali,
    scienze sociali, arte e musica.

    Tale istruzione à¨ generalmente indirizzata ai bambini, tuttavia à¨ inclusa anche
    l''erogazione di programmi per l''alfabetizzazione per adulti, interni o esterni
    al sistema scolastico, che presentano contenuti simili all''istruzione primaria
    ma che sono indirizzati a persone che hanno superato i limiti di età  per iscriversi
    alle scuole elementari.'
