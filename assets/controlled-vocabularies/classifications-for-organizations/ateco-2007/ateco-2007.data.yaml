    domestici, cuochi, camerieri, guardarobieri, maggiordomi, lavandaie, giardinieri,
    portinai, stallieri, autisti, custodi, governanti, baby-sitter, istitutori, segretari
    eccetera.

    Il personale domestico impiegato puà² dichiarare l''attività  del datore di lavoro
    in censimenti o studi, anche quando il datore di lavoro à¨ un singolo individuo.
    Il prodotto di questa attività  à¨ consumato in proprio dalla famiglia.'
  id: '97.00'
  label_it: Attività  di famiglie e convivenze come datori di lavoro per personale
    domestico
