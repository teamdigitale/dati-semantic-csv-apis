  definition: 'Questa divisione include i lavori generali per la costruzione di opere
    di ingegneria civile. Essa include i nuovi lavori, le riparazioni, le aggiunte
    e le alterazioni, il montaggio di strutture prefabbricate in cantiere e anche
    le costruzioni di natura temporanea.

    àˆ inclusa anche la costruzione di opere di ingegneria civile quali autostrade,
    strade, ponti, gallerie, ferrovie, campi di aviazione, porti ed altre opere idrauliche,
    la costruzione di sistemi di irrigazione e di fognatura, condotte e linee elettriche,
    impianti sportivi all''aperto eccetera. Queste attività  possono essere effettuate
    in conto proprio o in conto terzi. Il lavoro puà² essere effettuato totalmente
    o parzialmente in subappalto.'
