  definition: Questa classe comprende gli operatori organizzati per raccogliere, senza
    perà² gestire, titoli ed altre attività  finanziarie, per conto di azionisti e
    beneficiari. Le composizioni dei portafogli sono strutturate in modo tale da fornire
    investimenti con differenti caratteristiche, quali il grado di diversificazione,
    il rischio, il tasso di rendimento e la volatilità  dei prezzi. Le entrate di
    tali operatori sono costituite da interessi, dividendi, ed altri redditi da capitale;
    essi sono caratterizzati dall'assenza o da una presenza poco significativa di
    occupazione dipendente e dall'assenza di entrate per la vendita di servizi.
