  definition: 'Questa divisione include l''estrazione di combustibili minerali solidi
    attraverso le attività  di estrazione in sotterraneo e a cielo aperto e include
    le operazioni necessarie per ottenere un prodotto commerciabile (per esempio,
    cernita, lavaggio, compressione ed altre fasi necessarie al trasporto eccetera).

    Questa divisione non include le attività  di cokeria (cfr. 19.10), come pure i
    servizi connessi all''estrazione di carbone o lignite (cfr. 09.90) o la bricchettatura
    (cfr. 19.20).'
