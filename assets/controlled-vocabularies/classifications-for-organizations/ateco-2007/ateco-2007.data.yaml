  definition: Questo gruppo include l'istruzione generale continua, istruzione professionale
    continua e la formazione per le varie professioni, per hobby o per lo sviluppo
    conoscitivo personale. Sono escluse le attività  comprese nei gruppi 85.1-85.4  -  istruzione
    prescolastica, istruzione primaria, istruzione secondaria ed istruzione superiore.
    Sono inclusi corsi di preparazione all'attività  sportiva, corsi di lingua straniera,
    corsi di arte, recitazione o musica o altri corsi di formazione specialistici,
    non assimilabili alle attività  di istruzione generale comprese nei gruppi 85.1-85.4
