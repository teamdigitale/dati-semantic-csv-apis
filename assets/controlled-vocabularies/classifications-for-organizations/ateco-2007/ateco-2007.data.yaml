  definition: 'Questa divisione include la fornitura di alloggi per brevi periodi
    a visitatori e viaggiatori. àˆ inclusa anche la fornitura di alloggi per periodi
    di tempo pià¹ lunghi a studenti, lavoratori e figure simili. Alcune strutture
    forniscono unicamente alloggio, mentre altre forniscono una combinazione di alloggio,
    pasti e/o servizi accessori.

    Questa divisione esclude le attività  connesse alla fornitura di alloggio per
    lunghi periodi, in strutture quali appartamenti, generalmente affittati mensilmente
    o annualmente e che vengono classificati nelle Attività  Immobiliari (sezione
    L).'
