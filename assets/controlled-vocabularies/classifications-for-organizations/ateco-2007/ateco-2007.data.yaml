- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa classe comprende la fabbricazione di sistemi e strumenti di
    ricerca, localizzazione, navigazione, guida, strumenti aeronautici e nautici;
    controlli e regolatori automatici per applicazioni, quali il riscaldamento, il
    condizionamento, la refrigerazione e simili; strumenti di misurazione, visualizzazione,
    indicazione, registrazione, trasmissione e controllo della temperatura, dell''umidità ,
    della pressione, del vuoto, della combustione, del flusso, del livello, della
    viscosità , della densità , dell''acidità , della concentrazione e della rotazione;
    di misuratori di fluidi e simili (totalizzatori e contatori); strumenti per la
    misurazione delle caratteristiche dell''elettricità  e dei segnali elettrici;
    strumenti e sistemi di strumentazione per analisi di laboratorio di composti chimici
    o fisici, o per l''analisi delle concentrazioni di campioni di materiali solidi,
    fluidi, gassosi o compositi; altri strumenti di misurazione e verifica e parti
    di essi.

    àˆ inclusa in questa classe la fabbricazione di apparecchiature di misurazione,
    prova e navigazione non elettriche.'
  id: '26.51'
  label_it: Fabbricazione di strumenti e apparecchi di misurazione, prova e navigazione
    (esclusi quelli ottici)
