    o altri prodotti derivati dal petrolio greggio, da minerali bituminosi o dai loro
    prodotti di frazionamento. La raffinazione del petrolio prevede una o pià¹ delle
    seguenti attività : frazionamento; distillazione diretta del petrolio greggio;
    piroscissione.'
