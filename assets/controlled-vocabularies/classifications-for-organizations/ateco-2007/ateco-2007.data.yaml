- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include non solo l''estrazione da cave e miniere,
    ma anche il dragaggio di depositi alluvionali, la frantumazione di rocce e l''utilizzo
    di paludi salmastre. I prodotti vengono utilizzati principalmente per le costruzioni
    (ad esempio: sabbie, pietre eccetera), la produzione di materiali (ad esempio:
    argilla, pietra da gesso, calcio eccetera), la produzione di prodotti chimici
    eccetera.

    Questa divisione non include la lavorazione dei minerali estratti (esclusa la
    frantumazione, la macinazione, il taglio, il lavaggio, l''essiccazione, la cernita
    e la miscelazione).'
