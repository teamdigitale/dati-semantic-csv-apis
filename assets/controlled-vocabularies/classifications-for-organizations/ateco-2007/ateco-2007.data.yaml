  definition: 'Questa divisione include la trasformazione del petrolio greggio e del
    carbon fossile in prodotti utilizzabili. Il processo principale à¨ rappresentato
    dalla raffinazione del petrolio che comporta la separazione del greggio nei suoi
    componenti per mezzo di tecniche quali la piroscissione e la distillazione. Questa
    divisione include inoltre la fabbricazione per conto proprio di prodotti caratteristici
    (ad esempio: coke, butano, propano, benzina, cherosene, olio combustibile eccetera)
    e di servizi di trasformazione (ad esempio la raffinazione su richiesta del cliente).

    Questa divisione include la fabbricazione di gas come etano, propano e butano
    come prodotti delle raffinerie di petrolio.

    Non à¨ inclusa la fabbricazione di tali gas nelle industrie chimiche (cfr. 20.14),
    la fabbricazione di gas industriali (cfr. 20.11), l''estrazione di gas naturale
    (metano, etano, butano o propano) (cfr. 06.20), e la fabbricazione di gas combustibile
    non petrolifero (ad esempio gas prodotti dalla carbonizzazione del carbone, dai
    sottoprodotti dell''agricoltura o da rifiuti) (cfr. 35.21).

    Le unità  che fabbricano prodotti petrolchimici a partire dal petrolio raffinato
    sono classificate nella divisione 20.'
