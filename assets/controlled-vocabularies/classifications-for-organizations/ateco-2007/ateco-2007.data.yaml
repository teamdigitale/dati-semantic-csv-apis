  definition: 'Questa divisione include la fabbricazione di prodotti in legno, quali
    legname da costruzione, compensato, fogli da impiallacciatura, contenitori in
    legno, pavimenti in legno, capriate in legno ed edifici prefabbricati in legno.
    Le operazioni di produzione comprendono il taglio, la piallatura, la sagomatura,
    la laminatura, l''assemblaggio di prodotti in legno a partire da tronchi tagliati
    in travi o da legname da costruzione che puà² essere ulteriormente tagliato o
    sagomato da torni o altri utensili. Il legname da costruzione o gli altri elementi
    in legno trasformati possono essere ulteriormente piallati o levigati e montati
    in prodotti finiti come i contenitori in legno.

    Ad eccezione delle segherie la divisione à¨ organizzata principalmente in base
    ai prodotti specifici fabbricati.

    Nella divisione non à¨ inclusa la fabbricazione di mobili (31.0), nà© la posa
    in opera di articoli in legno e simili.'
