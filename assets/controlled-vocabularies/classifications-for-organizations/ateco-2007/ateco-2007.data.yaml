  definition: 'Questa classe include le attività  di produzione di registrazioni sonore
    originali, come nastri, Cd; le attività  di registrazione in studio o altrove
    per conto terzi, inclusa la registrazione su nastro (ossia, non dal vivo) di programmi
    radiofonici.

    Questa classe include anche le attività  di editoria musicale, ossia le attività 
    di acquisizione e registrazione dei diritti d''autore di composizioni musicali,
    attività  di promozione, autorizzazione ed utilizzo di tali composizioni in registrazioni,
    trasmissioni radiotelevisive, spettacoli cinematografici, spettacoli dal vivo,
    per la pubblicazione su supporti cartacei o su altri supporti. Le unità  impegnate
    in queste attività  possono possedere i diritti d''autore o agire in qualità 
    di amministratori dei diritti musicali, per conto dei possessori effettivi. La
    pubblicazione di musica e testi musicali à¨ inclusa in questa classe.'
  id: '59.20'
  label_it: Attività  di registrazione sonora e di editoria musicale
