  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione comprende la difesa degli interessi di una parte nei
    confronti di un''altra parte effettuata da (o sotto la direzione di) persone abilitate
    ad esercitare la professione forense, innanzi a un tribunale o altro organo giudiziario:
    assistenza e rappresentanza nei processi civili, assistenza e rappresentanza nei
    processi penali, assistenza e rappresentanza in materia di controversie del lavoro.
    àˆ inoltre inclusa la stesura di documenti legali quali statuti, accordi di collaborazione
    o documenti simili inerenti alla costituzione di società , brevetti e diritti
    d''autore, redazione di atti legali, di testamenti, di atti fiduciari eccetera
    oltre ad altre attività  notarili, di ufficiali giudiziari e di arbitrato. Sono
    incluse anche attività  di studi commerciali e tributari quali: revisione di documenti
    contabili, contabilità , ed elaborazione di documenti finanziari.'
