  definition: Questo gruppo include la fabbricazione di strumenti di misurazione,
    prova e navigazione per scopi industriali o non, inclusi gli strumenti per la
    misurazione del tempo come orologi e simili.
  id: '26.5'
  label_it: FABBRICAZIONE DI STRUMENTI E APPARECCHI DI MISURAZIONE, PROVA E NAVIGAZIONE;
    OROLOGI
