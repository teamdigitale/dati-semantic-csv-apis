  definition: Nella sezione sono incluse le attività  produttive che utilizzano le
    risorse di origine vegetale ed animale. La sezione include attività  dell'agricoltura,
    della zootecnia, della silvicoltura, della cattura di animali in aree di allevamento
    o ripopolamento o nei loro habitat naturali.
  id: A
  label_it: AGRICOLTURA, SILVICOLTURA E PESCA
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/A
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'L''estrazione da cave e miniere include l''estrazione dei minerali
    che si presentano in natura allo stato solido (carbone e minerali), liquido (petrolio)
    o gassoso (gas naturale). L''estrazione puà² essere effettuata utilizzando diversi
    metodi, quali l''impiego di miniere sotterranee o a cielo aperto, di pozzi, estrazioni
    marine eccetera.

    Questa sezione include attività  supplementari mirate alla preparazione dei materiali
    grezzi per la commercializzazione, per esempio, la frantumazione, la macinazione,
    il lavaggio, l''essiccazione, la cernita, la concentrazione di minerali, la liquefazione
    del gas naturale e l''agglomerazione dei combustibili solidi. Queste operazioni
    vengono spesso effettuate dalle unità  che hanno estratto le risorse e/o da altre
    unità  situate in prossimità  delle stesse.

    Le attività  estrattive sono classificate in divisioni, gruppi e classi in base
    al principale minerale prodotto. Le divisioni 05, 06 riguardano l''estrazione
    di combustibili fossili (carbone, lignite, petrolio, gas); le divisioni 07, 08
    riguardano i minerali metalliferi, minerali vari e prodotti di cava.

    Alcune operazioni tecniche di questa sezione, in particolare legate all''estrazione
    di idrocarburi, possono anche essere effettuate da unità  specializzate per conto
    terzi, come i servizi industriali che rientrano nella divisione 09.'
  id: B
  label_it: ESTRAZIONE DI MINERALI DA CAVE E MINIERE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/B
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa sezione include la trasformazione fisica o chimica di materiali,
    sostanze o componenti in nuovi prodotti, sebbene questo non sia l''unico criterio
    con cui à¨ possibile definire queste attività  (cfr. nota sul riciclaggio dei
    materiali di scarto). I materiali, le sostanze o i componenti trasformati sono
    materie prime che provengono dall''agricoltura, dalla silvicoltura, dalla pesca,
    dall''estrazione di minerali oppure sono il prodotto di altre attività  manifatturiere.
    L''alterazione, la rigenerazione o la ricostruzione sostanziale dei prodotti sono
    in genere considerate attività  manifatturiere.

    Le attività  manifatturiere spesso sono effettuate in stabilimenti, fabbriche
    od opifici che utilizzano macchine a motore e apparecchiature di movimentazione
    dei materiali. Rientrano in questa sezione anche le unità  che trasformano manualmente
    materiali e sostanze in nuovi prodotti, quelle che effettuano la manifattura nell''abitazione
    del lavoratore e le unità  che vendono al pubblico prodotti fabbricati nei medesimi
    locali in cui avviene la vendita, quali panetterie e sartorie di abiti su misura.
    Le unità  manifatturiere possono:

    -   lavorare direttamente i materiali

    -   subappaltare una parte della lavorazione dei materiali

    -   subappaltare l''intera lavorazione dei materiali propri e non, mantenendo
    la proprietà  legale ed i brevetti del prodotto

    -   portare a termine le lavorazioni subappaltate menzionate sopra.

    Il nuovo prodotto trasformato puà² essere finito, ossia pronto per l''utilizzo
    o il consumo, oppure puà² trattarsi di un prodotto semilavorato destinato ad un''ulteriore
    attività  manifatturiera. Ad esempio il prodotto di una raffineria di allumina
    viene utilizzato per la produzione di alluminio di base, l''alluminio primario
    viene utilizzato negli impianti di trafilatura per fili di alluminio e i fili
    di alluminio sono utilizzati per la fabbricazione di prodotti fatti con fili di
    alluminio.

    La produzione di componenti e parti specialistiche, nonchà© di accessori, di macchinari
    ed apparecchiature viene, in generale, classificata nella stessa classe della
    produzione di macchinari ed apparecchiature cui le parti e gli accessori sono
    destinati. La produzione di componenti e parti non specialistiche di macchinari
    e apparecchiature, ad esempio motori, pistoni, motori elettrici, gruppi elettrici,
    valvole, ingranaggi, cuscinetti a rulli, à¨ classificata nella classe di produzione
    appropriata, a prescindere dal macchinario o dall''apparecchiatura in cui queste
    parti saranno incluse. Tuttavia, la produzione di componenti e accessori specialistici
    tramite fusione o estrusione di materiali plastici à¨ inclusa nel gruppo 22.2.

    Il montaggio dei componenti di prodotti lavorati rientra tra le attività  manifatturiere
    ed include il montaggio dei prodotti creati tramite pezzi auto-prodotti o acquistati.

    Il riciclaggio dei materiali di scarto, ossia la trasformazione di questi materiali
    in materie prime secondarie, à¨ classificato all''interno del gruppo 38.3 (Recupero
    dei materiali). Sebbene possa implicare trasformazioni fisiche o chimiche, questo
    processo non à¨ considerato attività  manifatturiera. Lo scopo primario di queste
    attività  à¨ il trattamento o la lavorazione dei materiali di scarto, che vengono
    quindi classificate nella Sezione E (Forniture idriche; rete fognaria, gestione
    dei materiali di scarto e dei rifiuti, attività  di recupero). Tuttavia, la fabbricazione
    di prodotti finali nuovi (rispetto alle materie prime secondarie) viene classificata
    nelle attività  manifatturiere, anche se questi processi utilizzano i materiali
    di scarto come input. Per esempio, la produzione di argento dalle pellicole di
    scarto à¨ considerato un processo manifatturiero.

    In generale le attività  di manutenzione specializzata e riparazione di macchine
    e attrezzature industriali, commerciali e simili sono classificate nella divisione
    33 (Riparazione, manutenzione ed installazione di macchinari ed apparecchiature).
    Tuttavia, le unità  impiegate nella riparazione di computer, beni per uso personale
    e per la casa sono classificate all''interno della divisione 95 (Riparazione di
    computer e di beni per uso personale e per la casa), mentre quelle impiegate nella
    riparazione di autoveicoli sono classificate nella divisione 45 (Commercio all''ingrosso
    e al dettaglio e riparazione di autoveicoli e motocicli).

    L''installazione di macchinari ed apparecchiature, se effettuata come attività 
    specializzata, à¨ classificata nella classe 33.20.

    Di contro, la Nace non considera come manifatturiere altre attività  che talvolta
    implicano un processo di trasformazione, quali:

    -   Utilizzazione di aree forestali, classificata nella sezione A (Agricoltura,
    silvicoltura e pesca);

    -   Prima lavorazione di prodotti agricoli, classificata nella sezione A (Agricoltura,
    silvicoltura e pesca);

    -   La preparazione di alimenti per il consumo immediato sul posto à¨ classificata
    nella divisione 56 (Attività  dei servizi di ristorazione);

    -   Arricchimento di minerali, classificato nella sezione B (Estrazione di minerali);

    -   Costruzione di strutture e operazioni di fabbricazione eseguite nel cantiere
    edile, classificate nella sezione F (Costruzioni);

    -   Attività  per il riordinamento di grosse partite di merci e la loro ridistribuzione
    in partite pià¹ piccole, incluso l''imballaggio, il reimballaggio, o l''imbottigliamento
    di prodotti come liquori o elementi chimici; la cernita di cascami; la mescolatura
    di vernici e il taglio di metalli secondo l''ordine del cliente per produrre una
    versione modificata dello stesso prodotto, classificate nella sezione G (Commercio
    all''ingrosso e al dettaglio; riparazione di autoveicoli e motocicli).'
  id: C
  label_it: ATTIVITÀ MANIFATTURIERE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/C
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa sezione include l''attività  di fornitura di energia elettrica,
    gas naturale, vapore, acqua calda e simili attraverso una infrastruttura permanente
    (rete) con linee, tubature o condotte. L''estensione della rete non à¨ determinante;
    à¨ inclusa anche la distribuzione di elettricità , gas, vapore, acqua calda e
    simili in complessi industriali e edifici residenziali.

    Questa sezione include pertanto la gestione di aziende elettriche e del gas, che
    generano, controllano e distribuiscono energia elettrica o gas. àˆ inoltre inclusa
    l''erogazione di vapore e la fornitura di aria condizionata.'
  id: D
  label_it: FORNITURA DI ENERGIA ELETTRICA, GAS, VAPORE E ARIA CONDIZIONATA
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/D
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: Questa sezione include le attività  legate alla gestione (inclusa la
    raccolta, il trattamento e lo smaltimento) di varie forme di rifiuti, quali rifiuti
    solidi o non solidi industriali o domestici, come pure la gestione di siti contaminati.
    Il prodotto che risulta dal processo di trattamento dei rifiuti puà² essere smaltito
    oppure puà² diventare un input in altri processi di produzione. Anche le attività 
    di fornitura di acqua sono incluse in questa sezione, in quanto spesso sono condotte
    insieme al trattamento dei reflui, o comunque dalle stesse unità .
  id: E
  label_it: FORNITURA DI ACQUA; RETI FOGNARIE, ATTIVITÀ DI GESTIONE DEI RIFIUTI E
    RISANAMENTO
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/E
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa sezione comprende l''attività  generica e specializzata per
    la costruzione di edifici e di opere di ingegneria civile. Essa include i nuovi
    lavori, le riparazioni, le aggiunte, le alterazioni, l''installazione nei cantieri
    di edifici prefabbricati o di strutture e le costruzioni di natura temporanea.

    I lavori di costruzione generali riguardano la costruzione di complessi abitativi,
    fabbricati per uffici, negozi, ed altri edifici pubblici e di servizio, fabbricati
    rurali eccetera, nonchà© la costruzione di opere del genio civile come autostrade,
    strade, ponti, gallerie, ferrovie, campi di aviazione, porti e altre opere idrauliche,
    la costruzione di sistemi di irrigazione e di fognatura, impianti industriali,
    condotte e linee elettriche, impianti sportivi eccetera.

    Questi lavori possono essere eseguiti in conto proprio o per conto terzi. Parte
    dei lavori o il loro complesso possono essere effettuati in subappalto. Sono classificate
    in questa divisione anche le unità  responsabili di un progetto di costruzione
    nella sua globalità .

    Sono incluse anche le attività  di riparazione di edifici e le opere di ingegneria.

    Questa sezione include la costruzione di edifici nel loro complesso (divisione
    41), le opere di ingegneria civile (divisione 42), nonchà© i lavori di costruzione
    specializzati (divisione 43).

    Il noleggio di attrezzature con manovratore per costruzioni à¨ classificato fra
    i lavori di costruzione specializzati effettuati con tali attrezzature.

    Questa sezione comprende anche lo sviluppo di progetti per la costruzione di edifici
    o di opere di ingegneria civile attraverso il reperimento di mezzi finanziari,
    tecnici e fisici al fine di realizzare unità  immobiliari. Se tali attività  non
    sono finalizzate alla successiva vendita dei manufatti costruiti (o dei progetti
    realizzati), bensà¬ al loro impiego, l''unità  non deve essere classificata in
    questa sezione, ma in base al tipo di categoria di utilizzo, ossia attività  immobiliari,
    manifatturiero eccetera.

    In questa sezione à¨ inclusa l''attività  delle cooperative finalizzate al reperimento
    di mezzi finanziari, tecnici e fisici per realizzare progetti immobiliari, residenziali
    e non residenziali destinati all''utilizzo proprio.'
  id: F
  label_it: COSTRUZIONI
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/F
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: In questa sezione vengono classificate le attività  di vendita all'ingrosso
    e al dettaglio (ossia vendita senza trasformazione) di ogni genere di beni, nonchà©
    la fornitura di servizi correlati alla vendita di merci. La vendita all'ingrosso
    e quella al dettaglio costituiscono le fasi finali della catena di distribuzione
    di merci. Sono incluse in questa sezione anche la riparazione di autoveicoli e
    di motocicli. La vendita senza trasformazione comprende le operazioni di movimentazione
    delle merci abitualmente connesse all'attività  di commercio, ad esempio la suddivisione,
    il riordinamento e il raggruppamento di merci, la miscelatura di merci (ad esempio
    vino o sabbia), l'imbottigliamento (preceduto o meno dalla pulitura delle bottiglie),
    l'imballaggio, la suddivisione di grosse partite di merci e il reimballaggio per
    la distribuzione in partite pià¹ piccole, l'immagazzinaggio (con o senza congelamento
    o refrigerazione), la pulitura e l'essiccazione di prodotti agricoli, il taglio
    di pannelli di fibre o di lamine metalliche come attività  connesse. La divisione
    45 include tutte le attività  legate al commercio e alla riparazione di autoveicoli
    e di motocicli, mentre le divisioni 46 e 47 includono tutte le altre attività 
    commerciali. La distinzione tra la divisione 46 (Commercio all'ingrosso) e la
    divisione 47 (Commercio al dettaglio) si basa sulla tipologia di clientela predominante.
    La vendita all'ingrosso (senza trasformazione) riguarda, beni nuovi ed usati ceduti
    a dettaglianti, ad utilizzatori industriali, commerciali, istituzionali o professionali,
    ad altri grossisti, oppure ad operatori che comperano e vendono merci a tali persone
    o società . Essa viene effettuata da grossisti titolari delle merci commercializzate,
    da distributori industriali, esportatori, importatori, cooperative d'acquisto,
    concessionari di vendita e uffici di vendita (ma non negozi al dettaglio), tenuti
    da unità  manifatturiere o estrattive separate dagli impianti di produzione, mirate
    alla vendita dei prodotti e che non prendono semplicemente ordini da evadere tramite
    consegne dirette dalle fabbriche o dai siti minerari. Rientrano in questa sezione
    anche gli intermediari commerciali, gli agenti, le associazioni tra acquirenti
    e le associazioni cooperative che si occupano della vendita di prodotti delle
    aziende agricole. I commercianti all'ingrosso spesso raccolgono, scelgono e dividono
    fisicamente la merce in lottLa vendita al dettaglio (senza trasformazione) riguarda
    beni nuovi e usati ceduti al consumatore finale per uso e consumo personale o
    domestico. Essa viene effettuata in negozi, grandi magazzini, banchi, da società 
    di vendita per corrispondenza, da venditori ambulanti, da cooperative di consumo,
    da case d'asta eccetera. In genere i dettaglianti sono titolari dei beni che vendono,
    ma alcuni di essi vendono in conto deposito o a commissione.
  id: G
  label_it: COMMERCIO ALL'INGROSSO E AL DETTAGLIO; RIPARAZIONE DI AUTOVEICOLI E MOTOCICLI
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/G
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'In questa sezione sono comprese le attività  di trasporto di passeggeri
    o merci effettuate su base regolare o meno per ferrovia, mediante condotte, su
    strada, per via d''acqua o aereo e le attività  ausiliarie quali servizi ai terminal,
    parcheggi, centri di movimentazione e di magazzinaggio di merci eccetera, l''attività 
    di noleggio di mezzi di trasporto con autista od operatore. Sono anche incluse
    le attività  postali ed i servizi di corriere.

    Sono inclusi anche i trasporti di passeggeri a fini ricreativi.

    Questa sezione include i servizi di ristorazione e bar effettuati dalle stesse
    imprese che effettuano il trasporto.'
  id: H
  label_it: TRASPORTO E MAGAZZINAGGIO
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/H
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'In questa sezione sono incluse le strutture che forniscono alloggio
    per brevi periodi a visitatori e viaggiatori, nonchà© pasti e bevande pronti per
    il consumo. La quantità  e i tipi di servizi complementari forniti dalle strutture
    di questa sezione possono variare ampiamente.

    Questa sezione esclude la fornitura di alloggio per lunghi periodi, che viene
    classificata nelle Attività  Immobiliari (sezione L). Inoltre, à¨ esclusa la preparazione
    di alimenti o bevande non pronte per il consumo immediato o vendute tramite canali
    di distribuzione indipendenti, ovvero tramite attività  di commercio all''ingrosso
    o al dettaglio. La preparazione di questo tipo di alimenti à¨ classificata nelle
    Attività  manifatturiere (sezione C).'
  id: I
  label_it: ATTIVITÀ DEI SERVIZI DI ALLOGGIO E DI RISTORAZIONE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/I
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa sezione include la produzione e la distribuzione di informazioni
    e prodotti culturali, la gestione dei mezzi per la trasmissione e per la distribuzione
    di tali prodotti, nonchà© le attività  relative alla trasmissione di dati e comunicazioni,
    le attività  relative all''information technology (tecnologie dell''informatica)
    e le attività  di altri servizi di informazione.

    Le componenti principali di questa sezione sono: le attività  di editoria (divisione
    58), inclusa l''edizione di software, le attività  di produzioni cinematografiche
    e di registrazioni musicali (divisione 59), le attività  di trasmissione e programmazione
    radiofonica e televisiva (divisione 60), le telecomunicazioni (divisione 61),
    le attività  di informatica (divisione 62) e le attività  legate ad altri servizi
    di informazione (divisione 63).

    Le attività  legate all''editoria includono l''acquisizione dei diritti d''autore
    di contenuti (prodotti di informazione) e l''erogazione di tali prodotti al pubblico
    attivando (o prendendo accordi per) la riproduzione e la distribuzione degli stessi
    in varie forme. Tutte le possibili forme di editoria (in forma cartacea, elettronica
    o audio, su internet, su supporto multimediale, ad esempio testi su Cd-Rom eccetera)
    sono incluse in questa sezione.

    Le attività  relative alla produzione e alla distribuzione di programmazioni televisive
    sono incluse nelle divisioni 59, 60 e 61, in modo da mantenere separate le diverse
    fasi di questo processo. I singoli elementi, quali film, serie televisive eccetera
    sono realizzati tramite attività  incluse nella divisione 59, mentre la creazione
    di trasmissioni di programmi televisivi completi, costituiti da alcuni elementi
    prodotti nella divisione 59 e da altri componenti (quali la programmazione di
    telegiornali) à¨ inclusa nella divisione 60. La divisione 60 comprende anche la
    trasmissione di tali programmi, effettuata da parte del produttore degli stessi.
    La diffusione di trasmissioni di programmi televisivi completi da parte di terzi,
    ossia senza alterazione del contenuto, à¨ inclusa nella divisione 61. Queste attività 
    di diffusione possono avvenire tramite sistemi radiotelevisivi, via satellite
    o via cavo.'
  id: J
  label_it: SERVIZI DI INFORMAZIONE E COMUNICAZIONE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/J
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa sezione include le attività  di intermediazione finanziaria,
    incluse le assicurazioni, le riassicurazioni e i fondi pensione, nonchà© le attività 
    ausiliarie dell''intermediazione finanziaria.

    Sono incluse anche le attività  di assunzione e detenzione di attività  finanziarie,
    quali l''attività  delle holding, delle società  fiduciarie, delle società  di
    gestione dei fondi ed altri intermediari finanziari.'
  id: K
  label_it: ATTIVITÀ FINANZIARIE E ASSICURATIVE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/K
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Questa sezione include le attività  di locatori, agenti e/o mediatori
    che operano nell''ambito di uno o pià¹ dei seguenti settori: vendita e acquisto
    di immobili, affitto di immobili, fornitura di altri servizi immobiliari quali
    la valutazione di immobili o le attività  di agenti immobiliari per conto terzi.
    Le attività  incluse in questa sezione possono essere effettuate su beni immobili
    propri o in affitto ed anche per conto terzi.

    Questa sezione include anche gli amministratori di beni immobili.'
  id: L
  label_it: ATTIVITÀ IMMOBILIARI
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/L
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: Questa sezione comprende le attività  specialistiche professionali,
    scientifiche e tecniche. Tali attività  richiedono un elevato livello di preparazione
    e mettono a disposizione degli utenti conoscenze e capacità  specialistiche.
  id: M
  label_it: ATTIVITÀ PROFESSIONALI, SCIENTIFICHE E TECNICHE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/M
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'Le attività  previste in questa sezione possono essere svolte non solo
    a favore di imprese e/o istituzioni, ma anche a favore di utenti finali.

    Queste attività  differiscono da quelle incluse nella sezione M, in quanto il
    loro scopo primario non consiste nel trasferimento di conoscenze specialistiche.'
  id: N
  label_it: NOLEGGIO, AGENZIE DI VIAGGIO, SERVIZI DI SUPPORTO ALLE IMPRESE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/N
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'In questa sezione vengono classificate le attività  di natura governativa
    normalmente svolte dalle amministrazioni pubbliche. Sono incluse le attività 
    di promulgazione e di interpretazione giuridica delle leggi e dei relativi regolamenti
    attuativi, oltre all''amministrazione dei programmi fondati su tali leggi, le
    attività  legislative, il regime fiscale, la difesa nazionale, l''ordine e la
    sicurezza pubblica, i servizi per l''immigrazione, gli affari esteri e l''amministrazione
    dei programmi di governo. Questa sezione include anche le attività  connesse all''assicurazione
    sociale obbligatoria.

    Lo status giuridico o istituzionale non costituisce di per sà© il fattore determinante
    per l''inclusione di un''attività  in questa sezione, quanto piuttosto il fatto
    che si tratti di un''attività  elencata nel capoverso precedente. Questo significa
    che le attività  classificate altrove nell''ambito della Nace non rientrano in
    questa sezione, anche se vengono effettuate da enti pubblici. Per esempio, l''amministrazione
    del sistema scolastico (ossia le norme, i controlli, i curricula) rientra in questa
    sezione, al contrario dell''insegnamento (cfr. sezione P) e degli ospedali militari
    o carcerari che rientrano nella sezione Sanità  (cfr. sezione Q). Analogamente,
    alcune delle attività  descritte in questa sezione possono essere effettuate anche
    da unità  non appartenenti alla pubblica amministrazione.'
  id: O
  label_it: AMMINISTRAZIONE PUBBLICA E DIFESA; ASSICURAZIONE SOCIALE OBBLIGATORIA
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/O
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: 'In questa sezione viene classificata l''istruzione a qualsiasi livello
    o per qualsiasi professione. L''attività  puà² essere svolta attraverso lezioni
    orali o scritte, tramite radio, televisione, internet o per corrispondenza.

    La sezione include sia l''istruzione impartita dai vari istituti appartenenti
    al sistema scolastico nazionale ai suoi vari livelli, sia l''istruzione per adulti,
    i programmi contro l''analfabetismo eccetera. Sono inoltre incluse le scuole e
    le accademie militari, le scuole all''interno degli istituti penali eccetera ai
    rispettivi livelli. La sezione comprende sia l''istruzione pubblica che quella
    privata.

    Per ciascun livello d''istruzione iniziale le classi comprendono l''istruzione
    speciale rivolta agli alunni con disabilità  fisica o mentale.

    La sezione à¨ articolata in base al livello di istruzione offerto, secondo quanto
    stabilito dai livelli ISCED 1997. Le attività  delle istituzioni scolastiche che
    svolgono corsi al livello 0 ISCED vengono classificate nella classe 85.10, al
    livello 1 ISCED nella classe 85.20, ai livelli 2 e 3 ISCED nel gruppo 85.3, al
    livello 4 ISCED nella classe 85.41, ed ai livelli 5 e 6 ISCED nella classe 85.42.

    Questa sezione include anche l''istruzione impartita a scopi principalmente sportivi
    o ricreativi, ad esempio l''insegnamento del tennis o del golf e le attività 
    di supporto all''istruzione.'
  id: P
  label_it: ISTRUZIONE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/P
  vocab:
  - uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007
- '@type':
  - skos:Concept
  - covapit:PrivateOrgActivityType
  definition: Questa sezione include l'erogazione di servizi sanitari e le attività 
    di assistenza sociale. àˆ inclusa una vasta gamma di attività , tra cui l'assistenza
    sanitaria fornita da medici professionisti presso ospedali e altre strutture,
    le attività  di assistenza domiciliare che contemplano anche attività  di assistenza
    sanitaria o attività  di assistenza sociale che non contemplano il coinvolgimento
    degli operatori sanitari.
  id: Q
  label_it: SANITÀ E ASSISTENZA SOCIALE
  parent: []
  uri: https://w3id.org/italia/controlled-vocabulary/classifications-for-organizations/ateco-2007/Q
  vocab:
