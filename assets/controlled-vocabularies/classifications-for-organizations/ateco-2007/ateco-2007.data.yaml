  - covapit:PrivateOrgActivityType
  definition: 'Questa divisione include le attività  di consulenza e di assistenza
    ad imprese e ad altre organizzazioni in materia gestionale e, in particolare,
    in materia di: pianificazione strategica ed organizzativa; pianificazione finanziaria
    e di bilancio; obiettivi e politiche di marketing; politiche, strategie e pratiche
    di gestione delle risorse umane; programmazione della produzione, pianificazione
    e controllo della gestione aziendale. Sono incluse anche le attività  di supervisione
    e di gestione di altre unità  della stessa impresa, ossia le attività  di direzione
    aziendale.'
