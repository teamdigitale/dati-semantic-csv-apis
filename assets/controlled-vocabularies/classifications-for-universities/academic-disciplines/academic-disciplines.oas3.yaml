  description: 'I settori scientifico-disciplinari (S.S.D.) sono una distinzione disciplinare
    utilizzata in Italia per organizzare l''insegnamento superiore. I settori sono
    introdotti dalla legge n. 341 del 19 novembre 1990, anche se un raggruppamento
    per aree tematiche esisteva già dal 1973. I settori attuali sono stabiliti dal
    decreto ministeriale n. 855 del 30 ottobre 2015 e sono in vigore dal 20 novembre
    2015, data di pubblicazione sulla Gazzetta Ufficiale. - la versione Linked Open
    Data del vocabolario dei settori scientifico-disciplinari delle università italiane
    è stata creata da Giovanni Pirrotta (@gpirrotta), attivista della comunità Open
    Data Sicilia. Tale versione è stata poi integrata con una serie di allineamenti
    anche ad altri vocabolari controllati del settore Alta formazione e ricerca, come
    per esempio i vocabolari ERC panel del framework programme europeo Horizon 2020
    e ''fields of research and development (FORD)''. Si noti che gli allineamenti
    al vocabolario ERC panel non sono ufficiali ma elaborati nel corso degli anni
    nel contesto del progetto Toscana Open Research dai quali i vocabolari su Alta
    formazione e ricerca derivano.


